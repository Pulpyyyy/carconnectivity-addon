configuration:
  # --- GRUPA BRAND 1 ---
  brand1:
    name: "🚗 Wybór dla pierwszego samochodu"
    description: "Umożliwia wykorzystanie opcji specyficznych dla marki."
    fields:
      type:
        name: "Model"
      username:
        name: "Nazwa użytkownika"
        description: "Wprowadź adres e-mail używany do logowania się do usługi dla pierwszego samochodu."
      password:
        name: "Hasło"
        description: "Wprowadź hasło do swojego konta dla pierwszego samochodu."
      spin:
        name: "Kod PIN"
        description: "Wprowadź 4-cyfrowy kod PIN używany do zdalnego dostępu do pierwszego samochodu."
      interval:
        name: "Interwał odświeżania"
        description: "Interwał w sekundach. Uwaga na limity API: po przekroczeniu, API jest tymczasowo blokowane."

  # --- GRUPA BRAND 2 ---
  brand2:
    name: "🚙 Wybór dla drugiego samochodu"
    description: "Umożliwia wykorzystanie opcji specyficznych dla marki."
    fields:
      type:
        name: "Model"
      username:
        name: "Nazwa użytkownika"
        description: "Adres e-mail dla drugiego samochodu. Pozostaw puste, jeśli nie chcesz używać tego konektora."
      password:
        name: "Hasło"
        description: "Wprowadź hasło do swojego konta dla drugiego samochodu."
      spin:
        name: "Kod PIN"
        description: "Wprowadź 4-cyfrowy kod PIN dla drugiego samochodu."
      interval:
        name: "Interwał odświeżania"
        description: "Interwał w sekundach. Uwaga na limity API."

  # --- GRUPA VOLVO ---
  volvo:
    name: "🚕 Wybór specyficzny Volvo"
    description: "Konfiguracja dedykowana do API Volvo."
    fields:
      key_primary:
        name: "Klucz główny"
        description: "Klucz wygląda tak: 'd64b33a7067a4c428def9474964'"
      key_secondary:
        name: "Klucz pomocniczy"
        description: "Klucz wygląda tak: 'de0c63a885ffdac4ccc92d8744905611caf'"
      vehicle_token:
        name: "Token pojazdu"
        description: "Token specyficzny dla samochodu Volvo (długi ciąg znaków zaczynający się od eyJh...)"
      location_token:
        name: "Token lokalizacji"
        description: "Token specyficzny dla geolokalizacji (długi ciąg znaków zaczynający się od eyJh...)"
      interval:
        name: "Interwał Volvo"
        description: "Interwał w sekundach między pobieraniami danych dla samochodu Volvo."

  # --- GRUPA VW EU DATA ACT ---
  vw_eu_data_act:
    name: "⚡ Volkswagen EU Data Act"
    description: "Dostęp tylko do odczytu do Twojego Volkswagena przez portal EU Data Act (alternatywa, gdy WeConnect jest zablokowany). Wprowadź swoje dane uwierzytelniające Volkswagen ID. Najpierw musisz włączyć ciągłe żądanie danych co 15 minut dla swojego pojazdu w portalu. Dane odświeżają się mniej więcej co 15 minut; brak poleceń zdalnych."
    fields:
      username:
        name: "Nazwa użytkownika"
        description: "Adres e-mail Twojego konta Volkswagen ID."
      password:
        name: "Hasło"
        description: "Hasło Twojego konta Volkswagen ID."

  # --- GRUPA MQTT ---
  mqtt:
    name: "💬 Konfiguracja MQTT"
    fields:
      username:
        name: "Nazwa użytkownika MQTT"
        description: "Wprowadź nazwę użytkownika do połączenia z brokerem MQTT."
      password:
        name: "Hasło MQTT"
        description: "Wprowadź hasło do połączenia z brokerem MQTT."
      broker:
        name: "Adres brokera MQTT"
        description: "Wprowadź adres IP lub nazwę domeny serwera MQTT."
      port:
        name: "Port brokera MQTT"
        description: "Wprowadź numer portu serwera MQTT."

  # --- GRUPA WEBUI ---
  webui:
    name: "🌏 Interfejs WWW Carconnectivity"
    fields:
      enabled:
        name: "Włącz interfejs"
      username:
        name: "Nazwa administratora WebUI"
        description: "Użyj 'autologin', aby wyłączyć żądanie uwierzytelnienia."
      password:
        name: "Hasło WebUI"
        description: "Hasło do dostępu do Carconnectivity WebUI."

  # --- GRUPA ABRP ---
  abrp:
    name: "🔋 A Better Routeplanner (ABRP)"
    fields:
      enabled:
        name: "Włącz integrację ABRP"
      tokens:
        name: "Lista tokenów ABRP"
        description: "Połącz swój pojazd za pomocą 'Live Data' > 'Generic' w ABRP, aby uzyskać token. Skonfiguruj powiązanie VIN/Token."

  # --- GRUPA LOGS ---
  logs:
    name: "🔖 Logowanie (Logs)"
    fields:
      level:
        name: "Poziom ogólny"
        description: "Wybierz żądany poziom (info, warning, error, debug)."
      api_level:
        name: "Poziom API"
        description: "Poziom logowania specyficzny dla API."
      advanced:
        name: "Zaawansowane opcje nadpisywania logów"
        description: "Opcjonalne poziomy logowania dla poszczególnych konektorów i pluginów. Użyj default, aby zastosować globalne ustawienia logowania."
        fields:
          brand1:
            name: "Konto pojazdu 1"
            fields:
              log_level:
                name: "Poziom dziennika"
              api_log_level:
                name: "Poziom logowania API"
          brand2:
            name: "Konto pojazdu 2"
            fields:
              log_level:
                name: "Poziom dziennika"
              api_log_level:
                name: "Poziom logowania API"
          volvo:
            name: "Konektor Volvo"
            fields:
              log_level:
                name: "Poziom dziennika"
              api_log_level:
                name: "Poziom logowania API"
          mqtt:
            name: "Plugin MQTT"
            fields:
              log_level:
                name: "Poziom dziennika"
          webui:
            name: "Plugin interfejsu WWW"
            fields:
              log_level:
                name: "Poziom dziennika"
          abrp:
            name: "Plugin ABRP"
            fields:
              log_level:
                name: "Poziom dziennika"
          mqtt_homeassistant:
            name: "Plugin MQTT Home Assistant"
            fields:
              log_level:
                name: "Poziom dziennika"

  # --- OPCJA EXPERT ---
  expert:
    name: "🔑 Włącz tryb eksperta"
    description: "Pozwala na użycie niestandardowego pliku konfiguracyjnego (/addon_configs/.../carconnectivity.expert.json), który zastępuje interfejs graficzny. Zrestartuj supervisora, jeśli folder się nie pojawi."
