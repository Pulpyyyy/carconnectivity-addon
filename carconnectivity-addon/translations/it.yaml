configuration:
  # --- GRUPPO BRAND 1 ---
  brand1:
    name: "🚗 Scelta per la prima auto"
    description: "Permette di utilizzare le opzioni specifiche del marchio."
    fields:
      type:
        name: "Modello"
      username:
        name: "Nome utente"
        description: "Inserisci l'indirizzo email utilizzato per accedere al servizio per la prima auto."
      password:
        name: "Password"
        description: "Inserisci la password del tuo account per la prima auto."
      spin:
        name: "Codice PIN"
        description: "Inserisci il codice PIN a 4 cifre utilizzato per l'accesso remoto alla prima auto."
      interval:
        name: "Intervallo di aggiornamento"
        description: "Intervallo in secondi. Attenzione alle quote API: una volta superate, l'API viene temporaneamente bloccata."

  # --- GRUPPO BRAND 2 ---
  brand2:
    name: "🚙 Scelta per la seconda auto"
    description: "Permette di utilizzare le opzioni specifiche del marchio."
    fields:
      type:
        name: "Modello"
      username:
        name: "Nome utente"
        description: "Indirizzo email per la seconda auto. Lascia vuoto se non desideri usare questo connettore."
      password:
        name: "Password"
        description: "Inserisci la password del tuo account per la seconda auto."
      spin:
        name: "Codice PIN"
        description: "Inserisci il codice PIN a 4 cifre per la seconda auto."
      interval:
        name: "Intervallo di aggiornamento"
        description: "Intervallo in secondi. Attenzione alle quote API."

  # --- GRUPPO VOLVO ---
  volvo:
    name: "🚕 Configurazione specifica Volvo"
    description: "Configurazione dedicata alle API Volvo."
    fields:
      key_primary:
        name: "Chiave primaria"
        description: "La chiave ha un formato simile a 'd64b33a7067a4c428def9474964'"
      key_secondary:
        name: "Chiave secondaria"
        description: "La chiave ha un formato simile a 'de0c63a885ffdac4ccc92d8744905611caf'"
      vehicle_token:
        name: "Token del veicolo"
        description: "Token specifico dell'auto Volvo (stringa lunga che inizia con eyJh...)"
      location_token:
        name: "Token di localizzazione"
        description: "Token specifico per la geolocalizzazione (stringa lunga che inizia con eyJh...)"
      interval:
        name: "Intervallo Volvo"
        description: "Intervallo in secondi tra i recuperi dati per l'auto Volvo."

  # --- GRUPPO VW EU DATA ACT ---
  vw_eu_data_act:
    name: "⚡ Volkswagen EU Data Act"
    description: "Accesso in sola lettura alla tua Volkswagen tramite il portale EU Data Act (alternativa quando WeConnect è bloccato). Inserisci le tue credenziali Volkswagen ID. Devi prima attivare una richiesta dati continua di 15 minuti per il tuo veicolo sul portale. I dati si aggiornano circa ogni 15 minuti; nessun comando remoto."
    fields:
      username:
        name: "Nome utente"
        description: "Indirizzo email del tuo account Volkswagen ID."
      password:
        name: "Password"
        description: "Password del tuo account Volkswagen ID."

  # --- GRUPPO MQTT ---
  mqtt:
    name: "💬 Configurazione MQTT"
    fields:
      username:
        name: "Nome utente MQTT"
        description: "Inserisci il nome utente per la connessione al broker MQTT."
      password:
        name: "Password MQTT"
        description: "Inserisci la password per la connessione al broker MQTT."
      broker:
        name: "Indirizzo del broker MQTT"
        description: "Inserisci l'indirizzo IP o il nome del dominio del server MQTT."
      port:
        name: "Porta del broker MQTT"
        description: "Inserisci il numero della porta del server MQTT."

  # --- GRUPPO WEBUI ---
  webui:
    name: "🌏 Interfaccia WEB Carconnectivity"
    fields:
      enabled:
        name: "Abilita l'interfaccia"
      username:
        name: "Nome amministratore WebUI"
        description: "Usa 'autologin' per disattivare la richiesta di autenticazione."
      password:
        name: "Password WebUI"
        description: "Password per accedere alla WebUI di Carconnectivity."

  # --- GRUPPO ABRP ---
  abrp:
    name: "🔋 A Better Routeplanner (ABRP)"
    fields:
      enabled:
        name: "Abilita l'integrazione ABRP"
      tokens:
        name: "Elenco dei token ABRP"
        description: "Collega il tuo veicolo tramite 'Live Data' > 'Generic' in ABRP per ottenere il token. Configura la corrispondenza VIN/Token."

  # --- GRUPPO LOGS ---
  logs:
    name: "🔖 Registrazione (Logs)"
    fields:
      level:
        name: "Livello generale"
        description: "Seleziona il livello desiderato (info, warning, error, debug)."
      api_level:
        name: "Livello API"
        description: "Livello di registrazione specifico per le API."
      advanced:
        name: "Impostazioni avanzate di registrazione"
        description: "Livelli di log opzionali per connettore e per plugin. Usa default per ereditare le impostazioni globali di log."
        fields:
          brand1:
            name: "Account veicolo 1"
            fields:
              log_level:
                name: "Livello di log"
              api_log_level:
                name: "Livello di log dell'API"
          brand2:
            name: "Account veicolo 2"
            fields:
              log_level:
                name: "Livello di log"
              api_log_level:
                name: "Livello di log dell'API"
          volvo:
            name: "Connettore Volvo"
            fields:
              log_level:
                name: "Livello di log"
              api_log_level:
                name: "Livello di log dell'API"
          mqtt:
            name: "Plugin MQTT"
            fields:
              log_level:
                name: "Livello di log"
          webui:
            name: "Plugin interfaccia web"
            fields:
              log_level:
                name: "Livello di log"
          abrp:
            name: "Plugin ABRP"
            fields:
              log_level:
                name: "Livello di log"
          mqtt_homeassistant:
            name: "Plugin MQTT Home Assistant"
            fields:
              log_level:
                name: "Livello di log"

  # --- OPZIONE EXPERT ---
  expert:
    name: "🔑 Abilita modalità esperto"
    description: "Consente di usare un file di configurazione personalizzato (/addon_configs/.../carconnectivity.expert.json) che sostituisce l'interfaccia grafica. Riavvia il supervisor se la cartella non appare."
