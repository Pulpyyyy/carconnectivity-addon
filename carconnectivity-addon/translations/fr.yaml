configuration:
  # --- GROUPE BRAND 1 ---
  brand1:
    name: "🚗 Choix pour la 1ère voiture"
    description: "Permet d'exploiter les options spécifiques liées à la marque."
    fields:
      type:
        name: "Modèle"
      username:
        name: "Nom d'utilisateur"
        description: "Entrez l'adresse e-mail utilisée pour vous connecter au service pour la 1ère voiture."
      password:
        name: "Mot de passe"
        description: "Entrez le mot de passe de votre compte pour la 1ère voiture."
      spin:
        name: "Code PIN"
        description: "Entrez le code PIN à 4 chiffres utilisé pour l'accès à distance pour la 1ère voiture."
      interval:
        name: "Intervalle de rafraîchissement"
        description: "Intervalle en secondes. Attention aux quotas API : une fois dépassé, l'API est bloquée temporairement."

  # --- GROUPE BRAND 2 ---
  brand2:
    name: "🚙 Choix pour la 2ème voiture"
    description: "Permet d'exploiter les options spécifiques liées à la marque."
    fields:
      type:
        name: "Modèle"
      username:
        name: "Nom d'utilisateur"
        description: "Adresse e-mail pour la 2ème voiture. Laissez vide pour ne pas utiliser ce connecteur."
      password:
        name: "Mot de passe"
        description: "Entrez le mot de passe de votre compte pour la 2ème voiture."
      spin:
        name: "Code PIN"
        description: "Entrez le code PIN à 4 chiffres pour la 2ème voiture."
      interval:
        name: "Intervalle de rafraîchissement"
        description: "Intervalle en secondes. Attention aux quotas API."

  # --- GROUPE VOLVO ---
  volvo:
    name: "🚕 Choix spécifique Volvo"
    description: "Configuration dédiée aux API Volvo."
    fields:
      key_primary:
        name: "Clé primaire"
        description: "La clé ressemble à ceci : 'd64b33a7067a4c428def9474964'"
      key_secondary:
        name: "Clé secondaire"
        description: "La clé ressemble à ceci : 'de0c63a885ffdac4ccc92d8744905611caf'"
      vehicle_token:
        name: "Token véhicule"
        description: "Token spécifique à la voiture Volvo (chaîne longue commençant par eyJh...)"
      location_token:
        name: "Token localisation"
        description: "Token spécifique à la géolocalisation (chaîne longue commençant par eyJh...)"
      interval:
        name: "Intervalle Volvo"
        description: "Intervalle en secondes entre deux récupérations pour la voiture Volvo."

  # --- GROUPE VW EU DATA ACT ---
  vw_eu_data_act:
    name: "⚡ Volkswagen EU Data Act"
    description: "Accès en lecture seule à votre Volkswagen via le portail EU Data Act (alternative quand WeConnect est bloqué). Saisissez vos identifiants Volkswagen ID. Vous devez d'abord activer une demande de données continue de 15 minutes pour votre véhicule sur le portail. Données rafraîchies environ toutes les 15 minutes ; aucune commande à distance."
    fields:
      username:
        name: "Nom d'utilisateur"
        description: "Adresse e-mail de votre compte Volkswagen ID."
      password:
        name: "Mot de passe"
        description: "Mot de passe de votre compte Volkswagen ID."

  # --- GROUPE MQTT ---
  mqtt:
    name: "💬 Configuration MQTT"
    fields:
      username:
        name: "Nom d'utilisateur MQTT"
        description: "Entrez le nom d'utilisateur pour la connexion au broker MQTT."
      password:
        name: "Mot de passe MQTT"
        description: "Entrez le mot de passe pour la connexion au broker MQTT."
      broker:
        name: "Adresse du broker MQTT"
        description: "Entrez l'adresse IP ou le nom de domaine du serveur MQTT."
      port:
        name: "Port du broker MQTT"
        description: "Entrez le numéro de port du serveur MQTT."

  # --- GROUPE WEBUI ---
  webui:
    name: "🌏 Interface WEB Carconnectivity"
    fields:
      enabled:
        name: "Activer l'interface"
      username:
        name: "Nom administrateur WebUI"
        description: "Utilisez 'autologin' pour désactiver la demande d'authentification."
      password:
        name: "Mot de passe WebUI"
        description: "Mot de passe pour l'accès à Carconnectivity WebUI."

  # --- GROUPE ABRP ---
  abrp:
    name: "🔋 A Better Routeplanner (ABRP)"
    fields:
      enabled:
        name: "Activer la partie ABRP"
      tokens:
        name: "Liste des tokens ABRP"
        description: "Reliez votre véhicule via 'Live Data' > 'Generic' dans ABRP pour obtenir le jeton. Configurez la correspondance VIN/Jeton."

  # --- GROUPE LOGS ---
  logs:
    name: "🔖 Journalisation (Logs)"
    fields:
      level:
        name: "Niveau général"
        description: "Sélectionnez le niveau souhaité (info, warning, error, debug)."
      api_level:
        name: "Niveau des API"
        description: "Niveau de journalisation spécifique pour les API."
      advanced:
        name: "Paramètres avancés de journalisation"
        description: "Niveaux de journalisation facultatifs par connecteur et par plugin. Utilisez default pour hériter des paramètres globaux de journalisation."
        fields:
          brand1:
            name: "Compte véhicule 1"
            fields:
              log_level:
                name: "Niveau de journalisation"
              api_log_level:
                name: "Niveau de journalisation de l'API"
          brand2:
            name: "Compte véhicule 2"
            fields:
              log_level:
                name: "Niveau de journalisation"
              api_log_level:
                name: "Niveau de journalisation de l'API"
          volvo:
            name: "Connecteur Volvo"
            fields:
              log_level:
                name: "Niveau de journalisation"
              api_log_level:
                name: "Niveau de journalisation de l'API"
          mqtt:
            name: "Plugin MQTT"
            fields:
              log_level:
                name: "Niveau de journalisation"
          webui:
            name: "Plugin interface web"
            fields:
              log_level:
                name: "Niveau de journalisation"
          abrp:
            name: "Plugin ABRP"
            fields:
              log_level:
                name: "Niveau de journalisation"
          mqtt_homeassistant:
            name: "Plugin MQTT Home Assistant"
            fields:
              log_level:
                name: "Niveau de journalisation"

  # --- OPTION EXPERT ---
  expert:
    name: "🔑 Activer le mode expert"
    description: "Permet d'utiliser un fichier de configuration personnalisé (/addon_configs/.../carconnectivity.expert.json) qui remplace l'interface graphique. Redémarrez le superviseur si le dossier n'apparaît pas."
