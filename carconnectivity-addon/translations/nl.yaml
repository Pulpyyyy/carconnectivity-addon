configuration:
  # --- BRAND 1 GROEP ---
  brand1:
    name: "🚗 Keuze voor de 1e auto"
    description: "Maakt gebruik van merkspecifieke opties mogelijk."
    fields:
      type:
        name: "Model"
      username:
        name: "Gebruikersnaam"
        description: "Voer het e-mailadres in dat wordt gebruikt om verbinding te maken met de dienst voor de 1e auto."
      password:
        name: "Wachtwoord"
        description: "Voer het wachtwoord in voor je account van de 1e auto."
      spin:
        name: "Pincode"
        description: "Voer de 4-cijferige pincode in die wordt gebruikt voor externe toegang tot de 1e auto."
      interval:
        name: "Verversingsinterval"
        description: "Interval in seconden. Let op API-quota's: eenmaal overschreden, wordt de API tijdelijk geblokkeerd."

  # --- BRAND 2 GROEP ---
  brand2:
    name: "🚙 Keuze voor de 2e auto"
    description: "Maakt gebruik van merkspecifieke opties mogelijk."
    fields:
      type:
        name: "Model"
      username:
        name: "Gebruikersnaam"
        description: "E-mailadres voor de 2e auto. Laat leeg als je deze connector niet wilt gebruiken."
      password:
        name: "Wachtwoord"
        description: "Voer het wachtwoord in voor je account van de 2e auto."
      spin:
        name: "Pincode"
        description: "Voer de 4-cijferige pincode in voor de 2e auto."
      interval:
        name: "Verversingsinterval"
        description: "Interval in seconden. Let op API-quota's."

  # --- VOLVO GROEP ---
  volvo:
    name: "🚕 Volvo specifieke keuze"
    description: "Configuratie speciaal voor Volvo-API's."
    fields:
      key_primary:
        name: "Primaire sleutel"
        description: "De sleutel ziet er zo uit: 'd64b33a7067a4c428def9474964'"
      key_secondary:
        name: "Secundaire sleutel"
        description: "De sleutel ziet er zo uit: 'de0c63a885ffdac4ccc92d8744905611caf'"
      vehicle_token:
        name: "Voertuig token"
        description: "Token specifiek voor de Volvo-auto (lange tekenreeks beginnend met eyJh...)"
      location_token:
        name: "Locatie token"
        description: "Token specifiek voor geolocatie (lange tekenreeks beginnend met eyJh...)"
      interval:
        name: "Volvo interval"
        description: "Interval in seconden tussen gegevensopvragingen voor de Volvo-auto."

  # --- VW EU DATA ACT GROEP ---
  vw_eu_data_act:
    name: "⚡ Volkswagen EU Data Act"
    description: "Alleen-lezen toegang tot je Volkswagen via het EU Data Act-portaal (alternatief wanneer WeConnect geblokkeerd is). Voer je Volkswagen ID-inloggegevens in. Je moet eerst een doorlopend gegevensverzoek van 15 minuten voor je voertuig op het portaal inschakelen. Gegevens worden ongeveer elke 15 minuten vernieuwd; geen opdrachten op afstand."
    fields:
      username:
        name: "Gebruikersnaam"
        description: "E-mailadres van je Volkswagen ID-account."
      password:
        name: "Wachtwoord"
        description: "Wachtwoord van je Volkswagen ID-account."

  # --- MQTT GROEP ---
  mqtt:
    name: "💬 MQTT-configuratie"
    fields:
      username:
        name: "MQTT-gebruikersnaam"
        description: "Voer de gebruikersnaam in voor verbinding met de MQTT-broker."
      password:
        name: "MQTT-wachtwoord"
        description: "Voer het wachtwoord in voor verbinding met de MQTT-broker."
      broker:
        name: "MQTT-brokeradres"
        description: "Voer het IP-adres of de domeinnaam in van de MQTT-server."
      port:
        name: "MQTT-brokerpoort"
        description: "Voer het poortnummer in van de MQTT-server."

  # --- WEBUI GROEP ---
  webui:
    name: "🌏 Carconnectivity WEB-interface"
    fields:
      enabled:
        name: "Schakel de interface in"
      username:
        name: "WebUI-beheerdersnaam"
        description: "Gebruik 'autologin' om authenticatieverzoek uit te schakelen."
      password:
        name: "WebUI-wachtwoord"
        description: "Wachtwoord voor toegang tot Carconnectivity WebUI."

  # --- ABRP GROEP ---
  abrp:
    name: "🔋 A Better Routeplanner (ABRP)"
    fields:
      enabled:
        name: "Schakel ABRP-integratie in"
      tokens:
        name: "Lijst van ABRP-tokens"
        description: "Koppel je voertuig via 'Live Data' > 'Generic' in ABRP om het token te verkrijgen. Configureer de VIN/Token-koppeling."

  # --- LOGS GROEP ---
  logs:
    name: "🔖 Logboekregistratie (Logs)"
    fields:
      level:
        name: "Algemene niveau"
        description: "Selecteer het gewenste niveau (info, warning, error, debug)."
      api_level:
        name: "API-niveau"
        description: "Logboekniveau specifiek voor API's."

  # --- EXPERT OPTIE ---
  expert:
    name: "🔑 Schakel Expertmodus in"
    description: "Maakt gebruik van een aangepast configuratiebestand (/addon_configs/.../carconnectivity.expert.json) mogelijk dat de GUI overschrijft. Start de supervisor opnieuw op als de map niet verschijnt."
