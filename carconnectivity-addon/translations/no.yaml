configuration:
  # --- BRAND 1 GRUPPE ---
  brand1:
    name: "🚗 Valg for den første bilen"
    description: "Gjør det mulig å bruke merke-spesifikke alternativer."
    fields:
      type:
        name: "Modell"
      username:
        name: "Brukernavn"
        description: "Skriv inn e-postadressen som brukes for å logge inn på tjenesten for den første bilen."
      password:
        name: "Passord"
        description: "Skriv inn passordet for kontoen din for den første bilen."
      spin:
        name: "PIN-kode"
        description: "Skriv inn 4-sifret PIN-kode som brukes for fjernadgang til den første bilen."
      interval:
        name: "Oppdateringsintervall"
        description: "Intervall i sekunder. Merk API-kvoter: når kvoten er overskredet, blir API-en midlertidig blokkert."

  # --- BRAND 2 GRUPPE ---
  brand2:
    name: "🚙 Valg for den andre bilen"
    description: "Gjør det mulig å bruke merke-spesifikke alternativer."
    fields:
      type:
        name: "Modell"
      username:
        name: "Brukernavn"
        description: "E-postadresse for den andre bilen. La feltet stå tomt hvis du ikke vil bruke denne koblingen."
      password:
        name: "Passord"
        description: "Skriv inn passordet for kontoen din for den andre bilen."
      spin:
        name: "PIN-kode"
        description: "Skriv inn 4-sifret PIN-kode for den andre bilen."
      interval:
        name: "Oppdateringsintervall"
        description: "Intervall i sekunder. Merk API-kvoter."

  # --- VOLVO GRUPPE ---
  volvo:
    name: "🚕 Spesifikke valg Volvo"
    description: "Konfigurasjon dedikert til Volvo-API-er."
    fields:
      key_primary:
        name: "Primærnøkkel"
        description: "Nøkkelen ser slik ut: 'd64b33a7067a4c428def9474964'"
      key_secondary:
        name: "Sekundærnøkkel"
        description: "Nøkkelen ser slik ut: 'de0c63a885ffdac4ccc92d8744905611caf'"
      vehicle_token:
        name: "Kjøretøy-token"
        description: "Token spesifikk for Volvo-bilen (lang streng som starter med eyJh...)"
      location_token:
        name: "Lokasjon-token"
        description: "Token spesifikk for geolokalisering (lang streng som starter med eyJh...)"
      interval:
        name: "Volvo-intervall"
        description: "Intervall i sekunder mellom datainnhenting for Volvo-bilen."

  # --- VW EU DATA ACT GRUPPE ---
  vw_eu_data_act:
    name: "⚡ Volkswagen EU Data Act"
    description: "Skrivebeskyttet tilgang til din Volkswagen via EU Data Act-portalen (alternativ når WeConnect er blokkert). Skriv inn Volkswagen ID-legitimasjonen din. Du må først aktivere en kontinuerlig 15-minutters dataforespørsel for kjøretøyet ditt på portalen. Data oppdateres omtrent hvert 15. minutt; ingen fjernkommandoer."
    fields:
      username:
        name: "Brukernavn"
        description: "E-postadressen til Volkswagen ID-kontoen din."
      password:
        name: "Passord"
        description: "Passordet til Volkswagen ID-kontoen din."

  # --- MQTT GRUPPE ---
  mqtt:
    name: "💬 MQTT-konfigurasjon"
    fields:
      username:
        name: "MQTT-brukernavn"
        description: "Skriv inn brukernavn for tilkobling til MQTT-broker."
      password:
        name: "MQTT-passord"
        description: "Skriv inn passord for tilkobling til MQTT-broker."
      broker:
        name: "Adresse til MQTT-broker"
        description: "Skriv inn IP-adressen eller domenenavnet til MQTT-serveren."
      port:
        name: "Port for MQTT-broker"
        description: "Skriv inn portnummeret til MQTT-serveren."

  # --- WEBUI GRUPPE ---
  webui:
    name: "🌏 Carconnectivity WebUI"
    fields:
      enabled:
        name: "Aktiver grensesnittet"
      username:
        name: "Administratorbrukernavn for WebUI"
        description: "Bruk 'autologin' for å deaktivere autentiseringsforespørselen."
      password:
        name: "WebUI-passord"
        description: "Passord for tilgang til Carconnectivity WebUI."

  # --- ABRP GRUPPE ---
  abrp:
    name: "🔋 A Better Routeplanner (ABRP)"
    fields:
      enabled:
        name: "Aktiver ABRP-integrasjon"
      tokens:
        name: "Liste over ABRP-token"
        description: "Koble kjøretøyet ditt via 'Live Data' > 'Generic' i ABRP for å hente tokenet. Konfigurer VIN/Token-tilknytning."

  # --- LOGS GRUPPE ---
  logs:
    name: "🔖 Logging (Logs)"
    fields:
      level:
        name: "Generelt nivå"
        description: "Velg ønsket nivå (info, warning, error, debug)."
      api_level:
        name: "API-nivå"
        description: "Loggnivå spesifikk for API-er."
      advanced:
        name: "Avanserte logginnstillinger"
        description: "Valgfrie loggnivåer per kobling og per plugin. Bruk default for å arve de globale logginnstillingene."
        fields:
          brand1:
            name: "Kjøretøykonto 1"
            fields:
              log_level:
                name: "Loggnivå"
              api_log_level:
                name: "API-loggnivå"
          brand2:
            name: "Kjøretøykonto 2"
            fields:
              log_level:
                name: "Loggnivå"
              api_log_level:
                name: "API-loggnivå"
          volvo:
            name: "Volvo-kobling"
            fields:
              log_level:
                name: "Loggnivå"
              api_log_level:
                name: "API-loggnivå"
          mqtt:
            name: "MQTT-plugin"
            fields:
              log_level:
                name: "Loggnivå"
          webui:
            name: "Webgrensesnitt-plugin"
            fields:
              log_level:
                name: "Loggnivå"
          abrp:
            name: "ABRP-plugin"
            fields:
              log_level:
                name: "Loggnivå"
          mqtt_homeassistant:
            name: "MQTT Home Assistant-plugin"
            fields:
              log_level:
                name: "Loggnivå"

  # --- EXPERT ALTERNATIV ---
  expert:
    name: "🔑 Aktiver ekspertmodus"
    description: "Gjør det mulig å bruke en tilpasset konfigurasjonsfil (/addon_configs/.../carconnectivity.expert.json) som overstyrer GUI-et. Start supervisoren på nytt hvis mappen ikke vises."
