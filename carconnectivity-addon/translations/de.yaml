configuration:
  # --- BRAND 1 GRUPPE ---
  brand1:
    name: "🚗 Auswahl für das 1. Auto"
    description: "Ermöglicht die Nutzung spezifischer Optionen, die mit der Marke verbunden sind."
    fields:
      type:
        name: "Modell"
      username:
        name: "Benutzername"
        description: "Geben Sie die E-Mail-Adresse ein, die Sie für die Anmeldung beim Dienst für das erste Auto verwenden."
      password:
        name: "Passwort"
        description: "Geben Sie das Passwort für Ihr Konto für das erste Auto ein."
      spin:
        name: "PIN-Code"
        description: "Geben Sie den 4-stelligen PIN-Code ein, der für den Fernzugriff auf das erste Auto verwendet wird."
      interval:
        name: "Aktualisierungsintervall"
        description: "Intervall in Sekunden. Beachten Sie die API-Kontingente: Sobald das Kontingent überschritten ist, ist die API vorübergehend blockiert."

  # --- BRAND 2 GRUPPE ---
  brand2:
    name: "🚙 Auswahl für das 2. Auto"
    description: "Ermöglicht die Nutzung spezifischer Optionen, die mit der Marke verbunden sind."
    fields:
      type:
        name: "Modell"
      username:
        name: "Benutzername"
        description: "E-Mail-Adresse für das zweite Auto. Lassen Sie das Feld leer, wenn Sie diesen Connector nicht verwenden möchten."
      password:
        name: "Passwort"
        description: "Geben Sie das Passwort für Ihr Konto für das zweite Auto ein."
      spin:
        name: "PIN-Code"
        description: "Geben Sie den 4-stelligen PIN-Code für das zweite Auto ein."
      interval:
        name: "Aktualisierungsintervall"
        description: "Intervall in Sekunden. Beachten Sie die API-Kontingente."

  # --- VOLVO GRUPPE ---
  volvo:
    name: "🚕 Spezifische Auswahl Volvo"
    description: "Konfiguration speziell für Volvo-APIs."
    fields:
      key_primary:
        name: "Primärschlüssel"
        description: "Der Schlüssel sieht so aus: 'd64b33a7067a4c428def9474964'"
      key_secondary:
        name: "Sekundärschlüssel"
        description: "Der Schlüssel sieht so aus: 'de0c63a885ffdac4ccc92d8744905611caf'"
      vehicle_token:
        name: "Fahrzeug-Token"
        description: "Fahrzeugspezifisches Token für Volvo (lange Zeichenkette beginnend mit eyJh...)"
      location_token:
        name: "Standort-Token"
        description: "Standortspezifisches Token (lange Zeichenkette beginnend mit eyJh...)"
      interval:
        name: "Volvo-Intervall"
        description: "Intervall in Sekunden zwischen Datenabrufen für das Volvo-Fahrzeug."

  # --- VW EU DATA ACT GRUPPE ---
  vw_eu_data_act:
    name: "⚡ Volkswagen EU Data Act"
    description: "Schreibgeschützter Zugriff auf Ihren Volkswagen über das EU Data Act-Portal (Alternative, wenn WeConnect blockiert ist). Geben Sie Ihre Volkswagen ID-Zugangsdaten ein. Sie müssen zuerst eine kontinuierliche 15-Minuten-Datenanfrage für Ihr Fahrzeug im Portal aktivieren. Daten werden etwa alle 15 Minuten aktualisiert; keine Fernbefehle."
    fields:
      username:
        name: "Benutzername"
        description: "E-Mail-Adresse Ihres Volkswagen ID-Kontos."
      password:
        name: "Passwort"
        description: "Passwort Ihres Volkswagen ID-Kontos."

  # --- MQTT GRUPPE ---
  mqtt:
    name: "💬 MQTT-Konfiguration"
    fields:
      username:
        name: "MQTT Benutzername"
        description: "Geben Sie den Benutzernamen für die Verbindung zum MQTT-Broker ein."
      password:
        name: "MQTT Passwort"
        description: "Geben Sie das Passwort für die Verbindung zum MQTT-Broker ein."
      broker:
        name: "MQTT Broker-Adresse"
        description: "Geben Sie die IP-Adresse oder den Domainnamen des MQTT-Servers ein."
      port:
        name: "MQTT-Broker-Port"
        description: "Geben Sie die Portnummer des MQTT-Servers ein."

  # --- WEBUI GRUPPE ---
  webui:
    name: "🌏 Carconnectivity WEB-Oberfläche"
    fields:
      enabled:
        name: "Schnittstelle aktivieren"
      username:
        name: "WebUI-Administratorname"
        description: "Verwenden Sie 'autologin', um die Authentifizierungsabfrage zu deaktivieren."
      password:
        name: "WebUI-Passwort"
        description: "Passwort für den Zugriff auf Carconnectivity WebUI."

  # --- ABRP GRUPPE ---
  abrp:
    name: "🔋 A Better Routeplanner (ABRP)"
    fields:
      enabled:
        name: "ABRP-Integration aktivieren"
      tokens:
        name: "Liste der ABRP-Token"
        description: "Verbinden Sie Ihr Fahrzeug über 'Live Data' > 'Generic' in ABRP, um das Token zu erhalten. Konfigurieren Sie die VIN/Token-Zuordnung."

  # --- LOGS GRUPPE ---
  logs:
    name: "🔖 Protokollierung (Logs)"
    fields:
      level:
        name: "Allgemeine Ebene"
        description: "Wählen Sie das gewünschte Niveau (info, warning, error, debug)."
      api_level:
        name: "API-Ebene"
        description: "Protokollierungsniveau spezifisch für APIs."
      advanced:
        name: "Erweiterte Protokollierungsüberschreibungen"
        description: "Optionale Protokollstufen pro Connector und Plugin. Verwenden Sie default, um die globalen Protokollierungseinstellungen zu übernehmen."
        fields:
          brand1:
            name: "Fahrzeugkonto 1"
            fields:
              log_level:
                name: "Protokollstufe"
              api_log_level:
                name: "API-Protokollstufe"
          brand2:
            name: "Fahrzeugkonto 2"
            fields:
              log_level:
                name: "Protokollstufe"
              api_log_level:
                name: "API-Protokollstufe"
          volvo:
            name: "Volvo-Connector"
            fields:
              log_level:
                name: "Protokollstufe"
              api_log_level:
                name: "API-Protokollstufe"
          mqtt:
            name: "MQTT-Plugin"
            fields:
              log_level:
                name: "Protokollstufe"
          webui:
            name: "Web-UI-Plugin"
            fields:
              log_level:
                name: "Protokollstufe"
          abrp:
            name: "ABRP-Plugin"
            fields:
              log_level:
                name: "Protokollstufe"
          mqtt_homeassistant:
            name: "MQTT-Home-Assistant-Plugin"
            fields:
              log_level:
                name: "Protokollstufe"

  # --- EXPERT OPTION ---
  expert:
    name: "🔑 Expertenmodus aktivieren"
    description: "Ermöglicht die Verwendung einer benutzerdefinierten Konfigurationsdatei (/addon_configs/.../carconnectivity.expert.json), die die GUI überschreibt. Starten Sie den Supervisor neu, wenn der Ordner nicht angezeigt wird."
