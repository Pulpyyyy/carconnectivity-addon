configuration:
  # --- GRUPO BRAND 1 ---
  brand1:
    name: "🚗 Escolha para o 1º carro"
    description: "Permite utilizar opções específicas da marca."
    fields:
      type:
        name: "Modelo"
      username:
        name: "Nome de utilizador"
        description: "Insira o endereço de e-mail usado para se conectar ao serviço para o 1º carro."
      password:
        name: "Palavra-passe"
        description: "Insira a palavra-passe da sua conta para o 1º carro."
      spin:
        name: "Código PIN"
        description: "Insira o código PIN de 4 dígitos usado para acesso remoto ao 1º carro."
      interval:
        name: "Intervalo de atualização"
        description: "Intervalo em segundos. Atenção às quotas da API: uma vez ultrapassadas, a API é temporariamente bloqueada."

  # --- GRUPO BRAND 2 ---
  brand2:
    name: "🚙 Escolha para o 2º carro"
    description: "Permite utilizar opções específicas da marca."
    fields:
      type:
        name: "Modelo"
      username:
        name: "Nome de utilizador"
        description: "Endereço de e-mail para o 2º carro. Deixe em branco se não quiser usar este conector."
      password:
        name: "Palavra-passe"
        description: "Insira a palavra-passe da sua conta para o 2º carro."
      spin:
        name: "Código PIN"
        description: "Insira o código PIN de 4 dígitos para o 2º carro."
      interval:
        name: "Intervalo de atualização"
        description: "Intervalo em segundos. Atenção às quotas da API."

  # --- GRUPO VOLVO ---
  volvo:
    name: "🚕 Escolha específica Volvo"
    description: "Configuração dedicada às APIs da Volvo."
    fields:
      key_primary:
        name: "Chave primária"
        description: "A chave tem este formato: 'd64b33a7067a4c428def9474964'"
      key_secondary:
        name: "Chave secundária"
        description: "A chave tem este formato: 'de0c63a885ffdac4ccc92d8744905611caf'"
      vehicle_token:
        name: "Token do veículo"
        description: "Token específico para o carro Volvo (cadeia longa começando com eyJh...)"
      location_token:
        name: "Token de localização"
        description: "Token específico de geolocalização (cadeia longa começando com eyJh...)"
      interval:
        name: "Intervalo Volvo"
        description: "Intervalo em segundos entre recuperações de dados para o carro Volvo."

  # --- GRUPO VW EU DATA ACT ---
  vw_eu_data_act:
    name: "⚡ Volkswagen EU Data Act"
    description: "Acesso só de leitura ao seu Volkswagen através do portal EU Data Act (alternativa quando o WeConnect está bloqueado). Introduza as suas credenciais Volkswagen ID. Primeiro tem de ativar um pedido de dados contínuo de 15 minutos para o seu veículo no portal. Os dados são atualizados aproximadamente a cada 15 minutos; sem comandos remotos."
    fields:
      username:
        name: "Nome de utilizador"
        description: "Endereço de e-mail da sua conta Volkswagen ID."
      password:
        name: "Palavra-passe"
        description: "Palavra-passe da sua conta Volkswagen ID."

  # --- GRUPO MQTT ---
  mqtt:
    name: "💬 Configuração MQTT"
    fields:
      username:
        name: "Nome de utilizador MQTT"
        description: "Insira o nome de utilizador para se conectar ao broker MQTT."
      password:
        name: "Palavra-passe MQTT"
        description: "Insira a palavra-passe para se conectar ao broker MQTT."
      broker:
        name: "Endereço do broker MQTT"
        description: "Insira o endereço IP ou nome de domínio do servidor MQTT."
      port:
        name: "Porta do broker MQTT"
        description: "Insira o número da porta do servidor MQTT."

  # --- GRUPO WEBUI ---
  webui:
    name: "🌏 Interface WEB do Carconnectivity"
    fields:
      enabled:
        name: "Ativar a interface"
      username:
        name: "Nome de administrador WebUI"
        description: "Use 'autologin' para desativar a solicitação de autenticação."
      password:
        name: "Palavra-passe WebUI"
        description: "Palavra-passe para acesso à WebUI do Carconnectivity."

  # --- GRUPO ABRP ---
  abrp:
    name: "🔋 A Better Routeplanner (ABRP)"
    fields:
      enabled:
        name: "Ativar integração ABRP"
      tokens:
        name: "Lista de tokens ABRP"
        description: "Conecte o seu veículo através de 'Live Data' > 'Generic' no ABRP para obter o token. Configure a correspondência VIN/Token."

  # --- GRUPO LOGS ---
  logs:
    name: "🔖 Registo (Logs)"
    fields:
      level:
        name: "Nível geral"
        description: "Selecione o nível desejado (info, warning, error, debug)."
      api_level:
        name: "Nível das APIs"
        description: "Nível de registo específico para as APIs."
      advanced:
        name: "Substituições avançadas de registo"
        description: "Níveis de registo opcionais por conector e por plugin. Utilize default para herdar as definições globais de registo."
        fields:
          brand1:
            name: "Conta de veículo 1"
            fields:
              log_level:
                name: "Nível de registo"
              api_log_level:
                name: "Nível de registo da API"
          brand2:
            name: "Conta de veículo 2"
            fields:
              log_level:
                name: "Nível de registo"
              api_log_level:
                name: "Nível de registo da API"
          volvo:
            name: "Conector Volvo"
            fields:
              log_level:
                name: "Nível de registo"
              api_log_level:
                name: "Nível de registo da API"
          mqtt:
            name: "Plugin MQTT"
            fields:
              log_level:
                name: "Nível de registo"
          webui:
            name: "Plugin da interface web"
            fields:
              log_level:
                name: "Nível de registo"
          abrp:
            name: "Plugin ABRP"
            fields:
              log_level:
                name: "Nível de registo"
          mqtt_homeassistant:
            name: "Plugin MQTT Home Assistant"
            fields:
              log_level:
                name: "Nível de registo"

  # --- OPÇÃO EXPERT ---
  expert:
    name: "🔑 Ativar o modo avançado"
    description: "Permite utilizar um ficheiro de configuração personalizado (/addon_configs/.../carconnectivity.expert.json) que substitui a interface gráfica. Reinicie o supervisor se a pasta não aparecer."
