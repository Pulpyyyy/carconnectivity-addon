name: "CarConnectivity Add-on"
version: 0.8.10
slug: "carconnectivity-addon"
description: "CarConnectivity Add-on based on Till's project (https://github.com/tillsteinbach/CarConnectivity). May be unstable. MQTT required. Includes the in-app configuration page and the read-only EU Data Act connector (replaces the blocked VW/Seat/Cupra connectors)."
image: "docker.io/pulpyyyy/carconnectivity-addon-{arch}"
panel_icon: "mdi:car-wireless"
panel_title: "CarConnectivity"
map:
  - addon_config:rw
arch:
  - aarch64
  - amd64
ingress: true
init: false
hassio_api: true
hassio_role: homeassistant
homeassistant_api: true
# Configuration is done entirely in the addon Web UI (Ingress → /configui/).
# The single "info" option only exists to show a translated pointer on this
# otherwise empty Configuration tab; its value is never read by the addon.
options:
  info: "Infos → Web UI → Configuration"
schema:
  info: str
