configuration:
  # --- GRUPO BRAND 1 ---
  brand1:
    name: "🚗 Elección para el primer coche"
    description: "Permite utilizar opciones específicas relacionadas con la marca."
    fields:
      type:
        name: "Modelo"
      username:
        name: "Nombre de usuario"
        description: "Introduce la dirección de correo electrónico utilizada para conectarte al servicio del primer coche."
      password:
        name: "Contraseña"
        description: "Introduce la contraseña de tu cuenta para el primer coche."
      spin:
        name: "Código PIN"
        description: "Introduce el código PIN de 4 dígitos utilizado para el acceso remoto del primer coche."
      interval:
        name: "Intervalo de actualización"
        description: "Intervalo en segundos. Atención a las cuotas de API: una vez superadas, la API se bloquea temporalmente."

  # --- GRUPO BRAND 2 ---
  brand2:
    name: "🚙 Elección para el segundo coche"
    description: "Permite utilizar opciones específicas relacionadas con la marca."
    fields:
      type:
        name: "Modelo"
      username:
        name: "Nombre de usuario"
        description: "Dirección de correo electrónico para el segundo coche. Deja vacío si no deseas utilizar este conector."
      password:
        name: "Contraseña"
        description: "Introduce la contraseña de tu cuenta para el segundo coche."
      spin:
        name: "Código PIN"
        description: "Introduce el código PIN de 4 dígitos para el segundo coche."
      interval:
        name: "Intervalo de actualización"
        description: "Intervalo en segundos. Atención a las cuotas de API."

  # --- GRUPO VOLVO ---
  volvo:
    name: "🚕 Configuración específica Volvo"
    description: "Configuración dedicada a las APIs de Volvo."
    fields:
      key_primary:
        name: "Clave primaria"
        description: "La clave tiene un formato como este: 'd64b33a7067a4c428def9474964'"
      key_secondary:
        name: "Clave secundaria"
        description: "La clave tiene un formato como este: 'de0c63a885ffdac4ccc92d8744905611caf'"
      vehicle_token:
        name: "Token del vehículo"
        description: "Token específico del coche Volvo (cadena larga que comienza con eyJh...)"
      location_token:
        name: "Token de ubicación"
        description: "Token específico de geolocalización (cadena larga que comienza con eyJh...)"
      interval:
        name: "Intervalo Volvo"
        description: "Intervalo en segundos entre obtenciones de datos para el coche Volvo."

  # --- GRUPO VW EU DATA ACT ---
  vw_eu_data_act:
    name: "⚡ Volkswagen EU Data Act"
    description: "Acceso de solo lectura a tu Volkswagen a través del portal EU Data Act (alternativa cuando WeConnect está bloqueado). Introduce tus credenciales de Volkswagen ID. Primero debes activar una solicitud de datos continua de 15 minutos para tu vehículo en el portal. Los datos se actualizan aproximadamente cada 15 minutos; sin comandos remotos."
    fields:
      username:
        name: "Nombre de usuario"
        description: "Dirección de correo electrónico de tu cuenta Volkswagen ID."
      password:
        name: "Contraseña"
        description: "Contraseña de tu cuenta Volkswagen ID."

  # --- GRUPO MQTT ---
  mqtt:
    name: "💬 Configuración MQTT"
    fields:
      username:
        name: "Nombre de usuario MQTT"
        description: "Introduce el nombre de usuario para conectarte al broker MQTT."
      password:
        name: "Contraseña MQTT"
        description: "Introduce la contraseña para conectarte al broker MQTT."
      broker:
        name: "Dirección del broker MQTT"
        description: "Introduce la dirección IP o el nombre de dominio del servidor MQTT."
      port:
        name: "Puerto del broker MQTT"
        description: "Introduce el número de puerto del servidor MQTT."

  # --- GRUPO WEBUI ---
  webui:
    name: "🌏 Interfaz web de Carconnectivity"
    fields:
      enabled:
        name: "Activar la interfaz"
      username:
        name: "Nombre de administrador de WebUI"
        description: "Utiliza 'autologin' para desactivar la solicitud de autenticación."
      password:
        name: "Contraseña de WebUI"
        description: "Contraseña para acceder a la interfaz web de Carconnectivity."

  # --- GRUPO ABRP ---
  abrp:
    name: "🔋 A Better Routeplanner (ABRP)"
    fields:
      enabled:
        name: "Activar la integración ABRP"
      tokens:
        name: "Lista de tokens de ABRP"
        description: "Enlaza tu vehículo a través de 'Live Data' > 'Generic' en ABRP para obtener el token. Configura la correspondencia VIN/Token."

  # --- GRUPO LOGS ---
  logs:
    name: "🔖 Registro (Logs)"
    fields:
      level:
        name: "Nivel general"
        description: "Selecciona el nivel deseado (info, warning, error, debug)."
      api_level:
        name: "Nivel de APIs"
        description: "Nivel de registro específico para las APIs."

  # --- OPCIÓN EXPERT ---
  expert:
    name: "🔑 Activar modo experto"
    description: "Permite usar un archivo de configuración personalizado (/addon_configs/.../carconnectivity.expert.json) que reemplaza la interfaz gráfica. Reinicia el supervisor si la carpeta no aparece."
