
daemon off;

user root;
pid /var/run/nginx.pid;
worker_processes 1;
pcre_jit on;
error_log /proc/1/fd/1 error;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/includes/mime.types;

    access_log              off;
    client_max_body_size    4G;
    default_type            application/octet-stream;
    gzip                    on;
    keepalive_timeout       65;
    sendfile                on;
    server_tokens           off;
    tcp_nodelay             on;
    tcp_nopush              on;

    proxy_cache_path /config/.cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m use_temp_path=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    
    server {
        listen 8099 default_server;


        server_name _;
        root /dev/null;

        client_max_body_size 64M;

        # access_log /dev/stdout;
        # error_log /dev/stdout debug;

        add_header Content-Security-Policy "frame-src *" always;

        location / {
            absolute_redirect off;

            include /etc/nginx/includes/proxy_params.conf;
            proxy_set_header Origin "";

            proxy_pass http://127.0.0.1:4000;

            set $prefix $http_x_ingress_path;
            proxy_redirect '/' $prefix/;
            sub_filter 'href="/' 'href="$prefix/';
            sub_filter 'src="/' 'src="$prefix/';
            sub_filter "top.location.href='" "top.location.href='$prefix";
            sub_filter "iconUrl: '/" "iconUrl: '$prefix/";
            # Load the shared top-bar stylesheet (appbar.css, served by configui)
            # into the webui page so its injected bar is styled identically to the
            # config page bar from a single source.
            sub_filter '</head>' '<link rel="stylesheet" href="$prefix/configui/appbar.css"></head>';
            # Mirror the configui top bar onto the webui dashboard so the user can
            # switch back to Configuration. Relative href works under any Ingress base.
            sub_filter '</body>' '<nav class="appbar" style="position:fixed;top:0;left:0;right:0;z-index:99999"><a class="tab active">Dashboard</a><a class="tab" id="cc-cfg-link" style="cursor:pointer">Configuration</a><span class="eu-warning" id="cc-euw"></span><span id="cc-restart" style="display:none;color:#ffc107;font-size:.82em;font-weight:600;margin-left:12px;white-space:nowrap"></span></nav><style>body{padding-top:48px!important}</style><script>(function(){var a=document.getElementById("cc-cfg-link");if(!a)return;var base="$http_x_ingress_path";if(!base){var p=location.pathname;base=p.substring(0,p.lastIndexOf("/"));}if(base.charAt(base.length-1)==="/")base=base.substring(0,base.length-1);var u=base+"/configui/";a.addEventListener("click",function(e){e.preventDefault();e.stopPropagation();var go=function(){window.location.href=u;};var sw=navigator.serviceWorker;if(sw&&sw.controller&&sw.ready){sw.ready.then(function(r){return r.unregister();}).then(go,go);}else{go();}});var EUW={en:"EU Data Act is read-only: features available before are no longer possible (location, remote control, vehicle images, …).",fr:"EU Data Act est en lecture seule: des fonctions disponibles auparavant ne sont plus possibles (localisation, contrôle à distance, images du véhicule, …).",de:"EU Data Act ist schreibgeschützt: zuvor verfügbare Funktionen sind nicht mehr möglich (Standort, Fernsteuerung, Fahrzeugbilder, …).",it:"EU Data Act è di sola lettura: funzioni prima disponibili non sono più possibili (posizione, controllo remoto, immagini del veicolo, …).",es:"EU Data Act es de solo lectura: funciones antes disponibles ya no son posibles (ubicación, control remoto, imágenes del vehículo, …).",pl:"EU Data Act działa tylko do odczytu: funkcje dostępne wcześniej nie są już możliwe (lokalizacja, zdalne sterowanie, zdjęcia pojazdu, …).",pt:"EU Data Act é só de leitura: funções antes disponíveis já não são possíveis (localização, controlo remoto, imagens do veículo, …).",no:"EU Data Act er skrivebeskyttet: funksjoner som var tilgjengelige før, er ikke lenger mulige (posisjon, fjernstyring, kjøretøybilder, …)."};var lg=(navigator.language||"en").slice(0,2).toLowerCase();var w=document.getElementById("cc-euw");var r=document.getElementById("cc-restart");var RST={en:"The saved configuration is not applied yet: restart the addon.",fr:"La configuration enregistrée n’est pas encore appliquée : redémarrez l’addon.",de:"Die gespeicherte Konfiguration ist noch nicht aktiv: Starten Sie das Addon neu.",it:"La configurazione salvata non è ancora applicata: riavvia l’addon.",es:"La configuración guardada aún no está aplicada: reinicia el addon.",pl:"Zapisana konfiguracja nie została jeszcze zastosowana: uruchom ponownie dodatek.",pt:"A configuração guardada ainda não está aplicada: reinicie o addon.",no:"Den lagrede konfigurasjonen er ikke tatt i bruk ennå: start tillegget på nytt."};fetch(u+"api/meta").then(function(x){return x.json();}).then(function(m){if(w&&m.eu_data_act){w.textContent=EUW[lg]||EUW.en;}if(r&&m.restart_needed){var t=RST[lg]||RST.en;if(m.addon_url){var y=document.createElement("a");y.href=m.addon_url;y.target="_top";y.style.color="inherit";y.textContent=t;r.appendChild(y);}else{r.textContent=t;}r.style.display="";}}).catch(function(){});})();</script></body>';
            sub_filter_once off;

            # When the webui is disabled (upstream down), serve the config page
            # IN PLACE (internal proxy, no redirect). The 302 variant relied on
            # $http_x_ingress_path, which is empty behind non-standard proxies
            # (e.g. Multi-App Proxy) and produced a blank page.
            proxy_intercept_errors on;
            error_page 502 503 504 = @configui_fallback;
        }

        # Internal fallback: render the config page at the current path without
        # redirecting, so it works regardless of the Ingress/proxy base path.
        location @configui_fallback {
            include /etc/nginx/includes/proxy_params.conf;
            proxy_set_header Origin "";
            proxy_pass http://127.0.0.1:8098;
        }

        # Custom configuration page — cohabits with the webui under Ingress.
        # `^~` makes this prefix win over the image regex below, so any asset the
        # config page may serve (favicon, logo) is never misrouted to the webui.
        location = /configui { return 301 $http_x_ingress_path/configui/; }
        location ^~ /configui/ {
            include /etc/nginx/includes/proxy_params.conf;
            proxy_set_header Origin "";
            proxy_pass http://127.0.0.1:8098/;
        }
        location @configui_redirect {
            return 302 $http_x_ingress_path/configui/;
        }
        # Cache
        location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico)$ {
            absolute_redirect off;

            include /etc/nginx/includes/proxy_params.conf;
            proxy_set_header Origin "";

            proxy_pass http://127.0.0.1:4000;

            # Missing vehicle images redirect (302) to /static/icons/... via the
            # webui's ?fallback=. That Location is root-absolute (no Ingress base),
            # so rewrite it to include the base — otherwise it 404s at the HA root.
            proxy_redirect / $http_x_ingress_path/;

            proxy_cache my_cache;
            proxy_cache_valid 200 302 1h;
            proxy_cache_valid 404 10m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}

