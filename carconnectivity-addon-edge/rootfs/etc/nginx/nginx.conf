
daemon off;

user root;
pid /var/run/nginx.pid;
worker_processes 1;
pcre_jit on;
error_log /proc/1/fd/1 error;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/includes/mime.types;

    access_log              off;
    client_max_body_size    4G;
    default_type            application/octet-stream;
    gzip                    on;
    keepalive_timeout       65;
    sendfile                on;
    server_tokens           off;
    tcp_nodelay             on;
    tcp_nopush              on;

    proxy_cache_path /config/.cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m use_temp_path=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    
    server {
        listen 8099 default_server;


        server_name _;
        root /dev/null;

        client_max_body_size 64M;

        # access_log /dev/stdout;
        # error_log /dev/stdout debug;

        add_header Content-Security-Policy "frame-src *" always;

        location / {
            absolute_redirect off;

            include /etc/nginx/includes/proxy_params.conf;
            proxy_set_header Origin "";

            proxy_pass http://127.0.0.1:4000;

            set $prefix $http_x_ingress_path;
            proxy_redirect '/' $prefix/;
            sub_filter 'href="/' 'href="$prefix/';
            sub_filter 'src="/' 'src="$prefix/';
            sub_filter "top.location.href='" "top.location.href='$prefix";
            sub_filter "iconUrl: '/" "iconUrl: '$prefix/";
            # Mirror the configui top bar onto the webui dashboard so the user can
            # switch back to Configuration. Relative href works under any Ingress base.
            sub_filter '</body>' '<nav class="cc-appbar"><a class="active">Dashboard</a><a id="cc-cfg-link" style="cursor:pointer">Configuration</a><span id="cc-euw"></span></nav><style>body{padding-top:46px!important}.cc-appbar{position:fixed;top:0;left:0;right:0;height:46px;z-index:99999;display:flex;align-items:center;gap:4px;padding:0 16px;background:#212529;border-bottom:1px solid #2c3034;box-sizing:border-box;font:500 14px/1 -apple-system,Segoe UI,Roboto,sans-serif}.cc-appbar a{padding:7px 16px;border-radius:8px;background:#fff;color:#1c1e21;text-decoration:none;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.35);transition:box-shadow .15s,transform .1s}.cc-appbar a.active{background:#03a9f4;color:#fff;box-shadow:0 3px 6px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.35)}.cc-appbar a:not(.active):hover{box-shadow:0 2px 5px rgba(0,0,0,.45);transform:translateY(-1px)}#cc-euw{display:none;margin-left:auto;color:#ff6b6b;font-size:.82em;font-weight:600;text-align:right;line-height:1.2}</style><script>(function(){var a=document.getElementById("cc-cfg-link");if(!a)return;var base="$http_x_ingress_path";if(!base){var p=location.pathname;base=p.substring(0,p.lastIndexOf("/"));}if(base.charAt(base.length-1)==="/")base=base.substring(0,base.length-1);var u=base+"/configui/";a.addEventListener("click",function(e){e.preventDefault();e.stopPropagation();var go=function(){window.location.href=u;};var sw=navigator.serviceWorker;if(sw&&sw.controller&&sw.ready){sw.ready.then(function(r){return r.unregister();}).then(go,go);}else{go();}});var EUW={en:"EU Data Act is read-only: features available before are no longer possible (location, remote control, vehicle images, …).",fr:"EU Data Act est en lecture seule: des fonctions disponibles auparavant ne sont plus possibles (localisation, contrôle à distance, images du véhicule, …).",de:"EU Data Act ist schreibgeschützt: zuvor verfügbare Funktionen sind nicht mehr möglich (Standort, Fernsteuerung, Fahrzeugbilder, …).",it:"EU Data Act è di sola lettura: funzioni prima disponibili non sono più possibili (posizione, controllo remoto, immagini del veicolo, …).",es:"EU Data Act es de solo lectura: funciones antes disponibles ya no son posibles (ubicación, control remoto, imágenes del vehículo, …).",pl:"EU Data Act działa tylko do odczytu: funkcje dostępne wcześniej nie są już możliwe (lokalizacja, zdalne sterowanie, zdjęcia pojazdu, …).",pt:"EU Data Act é só de leitura: funções antes disponíveis já não são possíveis (localização, controlo remoto, imagens do veículo, …).",no:"EU Data Act er skrivebeskyttet: funksjoner som var tilgjengelige før, er ikke lenger mulige (posisjon, fjernstyring, kjøretøybilder, …)."};var lg=(navigator.language||"en").slice(0,2).toLowerCase();var w=document.getElementById("cc-euw");if(w){w.textContent=EUW[lg]||EUW.en;w.style.display="";}})();</script></body>';
            sub_filter_once off;

            # When the webui is disabled (upstream down), serve the config page
            # IN PLACE (internal proxy, no redirect). The 302 variant relied on
            # $http_x_ingress_path, which is empty behind non-standard proxies
            # (e.g. Multi-App Proxy) and produced a blank page.
            proxy_intercept_errors on;
            error_page 502 503 504 = @configui_fallback;
        }

        # Internal fallback: render the config page at the current path without
        # redirecting, so it works regardless of the Ingress/proxy base path.
        location @configui_fallback {
            include /etc/nginx/includes/proxy_params.conf;
            proxy_set_header Origin "";
            proxy_pass http://127.0.0.1:8098;
        }

        # Custom configuration page — cohabits with the webui under Ingress.
        location = /configui { return 301 $http_x_ingress_path/configui/; }
        location /configui/ {
            include /etc/nginx/includes/proxy_params.conf;
            proxy_set_header Origin "";
            proxy_pass http://127.0.0.1:8098/;
        }
        location @configui_redirect {
            return 302 $http_x_ingress_path/configui/;
        }
        # Cache
        location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico)$ {
            absolute_redirect off;

            include /etc/nginx/includes/proxy_params.conf;
            proxy_set_header Origin "";

            proxy_pass http://127.0.0.1:4000;

            # Missing vehicle images redirect (302) to /static/icons/... via the
            # webui's ?fallback=. That Location is root-absolute (no Ingress base),
            # so rewrite it to include the base — otherwise it 404s at the HA root.
            proxy_redirect / $http_x_ingress_path/;

            proxy_cache my_cache;
            proxy_cache_valid 200 302 1h;
            proxy_cache_valid 404 10m;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}

