name: Security Scan (Trivy)

permissions:
  contents: read
  security-events: write

on:
  workflow_call:
    inputs:
      addon:
        description: 'Addon directory (e.g. carconnectivity-addon-edge)'
        required: true
        type: string
      blocking:
        description: 'Fail the job if vulnerabilities are found'
        type: boolean
        default: true
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  trivy-scan:
    name: Trivy image scan (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, aarch64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Normalize arch
        id: norm
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            echo "docker_arch=arm64" >> $GITHUB_OUTPUT
          else
            echo "docker_arch=amd64" >> $GITHUB_OUTPUT
          fi

      - name: Read image reference
        id: info
        env:
          ADDON: ${{ inputs.addon }}
        run: |
          VERSION=$(grep -oP '(?:version|VERSION):\s*\K[0-9]+\.[0-9]+\.[0-9]+' "$ADDON/config.yaml" | head -n 1)
          TEMPLATE=$(grep -oP '(?:image):\s*\K\S+' "$ADDON/config.yaml" | tr -d '"')
          IMAGE="${TEMPLATE/\{arch\}/${{ steps.norm.outputs.docker_arch }}}:$VERSION"
          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT

          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            echo "PLATFORM=linux/arm64" >> $GITHUB_OUTPUT
          else
            echo "PLATFORM=linux/amd64" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ steps.info.outputs.IMAGE }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          TRIVY_PLATFORM: ${{ steps.info.outputs.PLATFORM }}
        with:
          image-ref: ${{ steps.info.outputs.IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: ${{ inputs.blocking && '1' || '0' }}
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ inputs.addon }}-${{ matrix.arch }}
