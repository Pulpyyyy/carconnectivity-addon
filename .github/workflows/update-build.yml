name: Update build.yaml on new submodule release

on:
  push:
    branches:
      - dependabot/submodules/**
  workflow_dispatch:
  workflow_call:
    inputs:
      addon:
        description: "Addon to update (e.g. carconnectivity-addon-edge). If empty, updates both."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        addon: ${{ inputs.addon && fromJSON(format('["{0}"]', inputs.addon)) || fromJSON('["carconnectivity-addon", "carconnectivity-addon-edge"]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      - name: Load submodule repos list
        run: |
          echo "SUBMODULE_REPOS<<EOF" >> $GITHUB_ENV
          cat .github/submodules.list >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Get latest versions of submodules ${{ matrix.addon }}...
        run: |
          export LC_ALL=C

          get_latest_version() {
              repo_url=$1
              is_edge=$2
          
              # Récupération des tags bruts
              tags=$(git ls-remote --tags "$repo_url" \
                  | awk '{print $2}' \
                  | sed 's|refs/tags/||' \
                  | grep -v '\^{}')
          
              # Fonction de normalisation pour trier correctement (stable > prerelease)
              normalize() {
                  local t="$1"
                  local clean="${t#v}"
          
                  if [[ "$clean" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(.*)$ ]]; then
                      local base="${BASH_REMATCH[1]}"
                      local suffix="${BASH_REMATCH[2]}"
          
                      if [[ -z "$suffix" ]]; then
                          # Stable = suffix "zzz" pour qu'il soit toujours trié AVANT les prereleases
                          echo "${base}-zzz $t"
                      else
                          # Prerelease
                          echo "${base}-${suffix} $t"
                      fi
                  else
                      # fallback si format non standard
                      echo "$clean $t"
                  fi
              }
          
              # Normalisation + tri SemVer du plus récent au plus ancien
              sorted=$(echo "$tags" | while read -r t; do normalize "$t"; done | sort -rV)
          
              if [ "$is_edge" = "true" ]; then
                  # EDGE = toujours le premier tag (stable si existe, sinon prerelease)
                  latest_version=$(echo "$sorted" | head -n 1 | awk '{print $2}')
              else
                  # STABLE = première version stable = celles contenant "zzz"
                  stable=$(echo "$sorted" | grep "zzz" | head -n 1 | awk '{print $2}')
          
                  if [ -n "$stable" ]; then
                      latest_version="$stable"
                  else
                      # Fallback stable → edge si aucun tag stable n'existe
                      latest_version=$(echo "$sorted" | head -n 1 | awk '{print $2}')
                  fi
              fi
          
              echo "$latest_version"
          }

          echo "Fetching latest versions for submodules"

          is_edge=$([[ "${{ matrix.addon }}" == *"edge"* ]] && echo "true" || echo "false")

          for repo_entry in $SUBMODULE_REPOS; do
            name=$(echo "$repo_entry" | cut -d= -f1)
            repo=$(echo "$repo_entry" | cut -d= -f2)

            latest_version=$(get_latest_version "$repo" "$is_edge")
            echo "LATEST_${name}_VERSION_${{ matrix.addon }}=$latest_version" >> $GITHUB_ENV
            echo "🔍 Found latest $name version: $latest_version"
          done

      - name: Display old and new versions ${{ matrix.addon }}...
        run: |
          echo "### Current and new versions :"

          compare_versions() {
            local component=$1
            local addon=$2
            local old_version=$(grep "${component}_VERSION" ${addon}/build.yaml | awk '{print $2}' | tr -d '"')
            local new_version_var="LATEST_${component}_VERSION_${addon}"
            local new_version=$(printenv $new_version_var)

            local repo_url=$(echo "$SUBMODULE_REPOS" | grep "^${component}=" | cut -d '=' -f2)
            local repo_name=$(basename "$repo_url" .git)

            if [ -n "$old_version" ] && [ "$old_version" != "$new_version" ]; then
              echo "🔄 ${component}_VERSION: $old_version → $new_version"
              echo "- **${repo_name}** → $new_version" >> ${addon}/bot_changelog.md
            fi
          }

          # Iterate through a list of components and compare their versions
          for component in $(echo "$SUBMODULE_REPOS" | cut -d= -f1); do
            compare_versions "$component" "${{ matrix.addon }}"
          done

      - name: Update build.yaml
        run: |
          echo "Updating build.yaml with new versions"

          changed=false

          for component in $(echo "$SUBMODULE_REPOS" | cut -d= -f1); do
            new_version_var="LATEST_${component}_VERSION_${{ matrix.addon }}"
            new_version=$(printenv $new_version_var)

            # Version actuelle dans le build.yaml
            old_version=$(grep "${component}_VERSION" "${{ matrix.addon }}/build.yaml" | awk '{print $2}' | tr -d '"')

            # Si la version est différente → on modifie
            if [ "$old_version" != "$new_version" ]; then
              echo "🔄 ${component}_VERSION: $old_version → $new_version"
              sed -i "s|${component}_VERSION:.*|${component}_VERSION: \"$new_version\"|" "${{ matrix.addon }}/build.yaml"
              changed=true
            fi
          done

          # Export de l'état final
          if [ "$changed" = true ]; then
            echo "CHANGES=true" >> $GITHUB_ENV
            echo "Changes detected."
          else
            echo "CHANGES=false" >> $GITHUB_ENV
            echo "No update needed."
          fi

      - name: Validate pip dependency compatibility
        if: env.CHANGES == 'true'
        run: |
          set -euo pipefail
          ADDON="${{ matrix.addon }}"

          # Packages without a standard PyPI distribution (e.g. unreleased pre-release)
          PIP_SKIP="VOLVO"

          pkg_args=""
          while IFS='=' read -r key repo_url; do
            [[ -z "$key" || "$key" == \#* ]] && continue

            if echo "$PIP_SKIP" | grep -qw "$key"; then
              echo "⏭ Skipping $key (not on PyPI)"
              continue
            fi

            pkg_name=$(basename "$repo_url" .git | tr '[:upper:]' '[:lower:]')
            ver=$(grep "${key}_VERSION" "$ADDON/build.yaml" | awk '{print $2}' | tr -d '"' | sed 's/^v//')

            if [ -n "$ver" ]; then
              pkg_args="$pkg_args ${pkg_name}==$ver"
            fi
          done < .github/submodules.list

          python3 -m venv /tmp/pip-check-venv
          /tmp/pip-check-venv/bin/pip install --quiet --upgrade pip

          echo "Validating: $pkg_args"
          # shellcheck disable=SC2086
          if /tmp/pip-check-venv/bin/pip install --no-cache-dir $pkg_args > /tmp/pip-conflict.txt 2>&1; then
            echo "✅ All dependencies compatible — proceeding"
          else
            echo "::warning::Dependency conflict detected — reverting $ADDON/build.yaml"
            cat /tmp/pip-conflict.txt
            git checkout -- "$ADDON/build.yaml"
            rm -f "$ADDON/bot_changelog.md"
            echo "CHANGES=false" >> $GITHUB_ENV
            echo "CONFLICT_DETECTED=true" >> $GITHUB_ENV
          fi

      - name: Increment version ${{ matrix.addon }}
        if: env.CHANGES == 'true'
        run: |
          version=$(grep -E '^version:' "carconnectivity-addon-edge/config.yaml" | awk '{print $2}' | sed 's/"//g')
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch + 1))
          new_version="${major}.${minor}.${patch}"

          sed -i "s/^version: .*/version: $new_version/" "${{ matrix.addon }}/config.yaml"
          echo "Version updated: $version -> $new_version"
          echo "NEW_VERSION=$new_version" >> $GITHUB_ENV

          cp ${{ matrix.addon }}/CHANGELOG.md ${{ matrix.addon }}/old_CHANGELOG.md

          echo -e "## $new_version\n" > ${{ matrix.addon }}/CHANGELOG.md

          if [ -f ${{ matrix.addon }}/next_CHANGELOG.md ] && [ -s ${{ matrix.addon }}/next_CHANGELOG.md ]; then
            echo "### 🚀 New Features" >> ${{ matrix.addon }}/CHANGELOG.md
            cat ${{ matrix.addon }}/next_CHANGELOG.md >> ${{ matrix.addon }}/CHANGELOG.md
            if [ "${{ matrix.addon }}" = "carconnectivity-addon-edge" ]; then
              cat ${{ matrix.addon }}/next_CHANGELOG.md >> carconnectivity-addon/next_CHANGELOG.md
            fi
            > ${{ matrix.addon }}/next_CHANGELOG.md
          fi

          echo -e "\n### 🛠️ Fixes & Updates\n" >> ${{ matrix.addon }}/CHANGELOG.md  
          cat ${{ matrix.addon }}/bot_changelog.md >> ${{ matrix.addon }}/CHANGELOG.md
          rm ${{ matrix.addon }}/bot_changelog.md

          if [ -f ${{ matrix.addon }}/fix_CHANGELOG.md ] && [ -s ${{ matrix.addon }}/fix_CHANGELOG.md ]; then
            cat ${{ matrix.addon }}/fix_CHANGELOG.md >> ${{ matrix.addon }}/CHANGELOG.md
            if [ "${{ matrix.addon }}" = "carconnectivity-addon-edge" ]; then
              cat ${{ matrix.addon }}/fix_CHANGELOG.md >> carconnectivity-addon/fix_CHANGELOG.md
            fi
            > ${{ matrix.addon }}/fix_CHANGELOG.md
          fi

          echo -e "\n --- \n" >> ${{ matrix.addon }}/CHANGELOG.md
          cat ${{ matrix.addon }}/old_CHANGELOG.md >> ${{ matrix.addon }}/CHANGELOG.md
          rm ${{ matrix.addon }}/old_CHANGELOG.md

      - name: Commit and push changes on the Current Branch ${{ matrix.addon }}
        if: env.CHANGES == 'true'
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git pull
          git add .
          git diff --cached --quiet || git commit -m "Update build.yaml with latest submodule versions"
          git push

      - name: Report pip dependency conflict
        if: env.CONFLICT_DETECTED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ADDON="${{ matrix.addon }}"

          # Job summary visible dans l'onglet Actions du run
          {
            echo "## ⚠️ Pip dependency conflict — \`$ADDON\`"
            echo ""
            echo "The \`build.yaml\` was automatically reverted. No version bump or release."
            echo ""
            echo "### Conflict details"
            echo '```'
            cat /tmp/pip-conflict.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Ouvre une issue GitHub si aucune n'est déjà ouverte pour cet addon
          TITLE="⚠️ Pip dependency conflict — $ADDON"
          existing=$(gh issue list --state open --search "in:title $TITLE" --json number --jq 'length')
          if [ "$existing" -eq 0 ]; then
            BODY=$(printf '## Pip dependency conflict\n\nAddon: `%s`\n\nThe automated update workflow detected incompatible pip dependencies and reverted `build.yaml` to its previous state. No version bump or release was made.\n\nFix the upstream dependency conflict — the next automated run will then succeed.\n\n### Conflict details\n```\n%s\n```' \
              "$ADDON" "$(cat /tmp/pip-conflict.txt)")
            gh issue create --title "$TITLE" --body "$BODY"
          else
            echo "ℹ️ Issue already open for $ADDON — skipping creation"
          fi
