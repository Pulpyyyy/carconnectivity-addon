name: Build and Push Docker Images
permissions:
  contents: read
  packages: write
  id-token: write

on:
  push:
    tags:
      - 'v*'
      - '!*-edge'
  workflow_dispatch:
  workflow_call:
    inputs:
      addon:
        description: 'Addon to build (e.g. carconnectivity-addon-edge). If empty, builds both.'
        required: false
        type: string
  
env:
  REPOSITORY: pulpyyyy
  REGISTRY: docker.io
  
concurrency:
  group: ${{ github.ref }}-${{ inputs.addon || 'all' }}
  cancel-in-progress: true

jobs:
  build_addon:
    name: Build addon
    runs-on: ubuntu-latest
    strategy:
      matrix:
        addon: ${{ inputs.addon && fromJSON(format('["{0}"]', inputs.addon)) || fromJSON('["carconnectivity-addon", "carconnectivity-addon-edge"]') }}
        
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Check if image already exists on Docker Hub
        id: check_image
        run: |
          TAG="${{ steps.info.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ matrix.addon }}:$TAG"

          echo "Checking Docker Hub for $IMAGE"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://hub.docker.com/v2/repositories/${{ env.REPOSITORY }}/${{ matrix.addon }}/tags/$TAG/)

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image already exists on Docker Hub: $IMAGE"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Image does NOT exist yet: $IMAGE"
          fi
          
      - name: Publish builder
        uses: home-assistant/builder@2026.03.2
        with:
          args: |
            --addon \
            --amd64 --aarch64 \
            --docker-hub "${{ env.REGISTRY }}" \
            --target /data/${{ matrix.addon }} \
            --docker-hub-check \
            --docker-user ${{ secrets.DOCKERHUB_USERNAME }} \
            --docker-password ${{ secrets.DOCKERHUB_TOKEN }}
