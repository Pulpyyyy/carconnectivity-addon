name: Builder (Buildx Multi‑Arch PRO 2026)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      addon:
        description: "Nom du dossier addon (ex: carconnectivity-addon-edge)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6

      # 🔍 Résolution du nom d’addon (orchestrateur ou manuel)
      - name: Resolve addon name
        id: resolve
        run: |
          ADDON="${{ github.event.inputs.addon || inputs.addon }}"
          echo "addon=$ADDON" >> $GITHUB_OUTPUT

      # 🔍 Récupération version via outil officiel Home Assistant
      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ steps.resolve.outputs.addon }}"

      # 🧼 Nettoyage du TAG (supprime les "" renvoyés par info@helper)
      - name: Clean version
        id: clean
        run: |
          RAW="${{ steps.info.outputs.version }}"
          VERSION=$(echo "$RAW" | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 🔍 Skip build si l'image existe déjà par arch
      - name: Check if images exist
        id: exist
        run: |
          TAG="${{ steps.clean.outputs.version }}"
          ADDON="${{ steps.resolve.outputs.addon }}"

          for ARCH in amd64 aarch64; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://hub.docker.com/v2/repositories/pulpyyyy/${ADDON}-${ARCH}/tags/${TAG}/")

            if [ "$STATUS" -eq 200 ]; then
              echo "found_${ARCH}=true" >> $GITHUB_OUTPUT
            else
              echo "found_${ARCH}=false" >> $GITHUB_OUTPUT
            fi
          done

      # 🛠️ Buildx uniquement si nécessaire
      - name: Setup Buildx
        if: steps.exist.outputs.found_amd64 == 'false' || steps.exist.outputs.found_aarch64 == 'false'
        uses: docker/setup-buildx-action@v3

      # 🔐 Login Docker Hub
      - name: DockerHub login
        if: steps.exist.outputs.found_amd64 == 'false' || steps.exist.outputs.found_aarch64 == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🏗️ Build & Push Multi‑Arch + Manifest Auto
      - name: Build & Push Multi‑Arch
        if: steps.exist.outputs.found_amd64 == 'false' || steps.exist.outputs.found_aarch64 == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.resolve.outputs.addon }}
          platforms: |
            linux/amd64
            linux/arm64
          push: true

          # Manifest auto pour VERSION + LATEST
          tags: |
            pulpyyyy/${{ steps.resolve.outputs.addon }}:${{ steps.clean.outputs.version }}
            pulpyyyy/${{ steps.resolve.outputs.addon }}:latest

          # Cache Docker Hub
          cache-from: type=registry,ref=pulpyyyy/${{ steps.resolve.outputs.addon }}:latest
          cache-to: type=inline
