name: Builder (Buildx Multi‑Arch FINAL)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string
    outputs:
      built:
        description: "true if new images were built and pushed"
        value: ${{ jobs.manifest.outputs.built }}

  workflow_dispatch:
    inputs:
      addon:
        description: "Addon directory"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # #############################################################
  #  PREPARE — résolution addon + version (hors matrix)
  # #############################################################
  prepare:
    runs-on: ubuntu-latest

    outputs:
      addon: ${{ steps.resolve.outputs.addon }}
      version: ${{ steps.clean.outputs.version }}
      archs: ${{ steps.archs.outputs.archs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve addon name
        id: resolve
        run: |
          ADDON="${{ github.event.inputs.addon || inputs.addon }}"
          echo "addon=$ADDON" >> $GITHUB_OUTPUT

      - name: Define architectures
        id: archs
        run: echo 'archs=["amd64","arm64"]' >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # VERSION via Home Assistant helper (config.yaml)
      # ---------------------------------------------------------
      - name: Get addon info (HA helper)
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ steps.resolve.outputs.addon }}"

      - name: Clean version
        id: clean
        run: |
          VERSION=$(echo "${{ steps.info.outputs.version }}" | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # #############################################################
  #                       BUILD JOB
  # #############################################################
  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        arch: ${{ fromJSON(needs.prepare.outputs.archs) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ---------------------------------------------------------
      # NORMALIZE ARCH for build.yaml (arm64 ↔ aarch64)
      # ---------------------------------------------------------
      - name: Normalize arch
        id: norm
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          if [ "$ARCH" = "arm64" ]; then
            echo "ha_arch=aarch64" >> $GITHUB_OUTPUT
          else
            echo "ha_arch=amd64" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # INSTALL yq v4
      # ---------------------------------------------------------
      - name: Install yq v4
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      # ---------------------------------------------------------
      # ANALYSE build.yaml → BUILD_FROM + args
      # ---------------------------------------------------------
      - name: Read build.yaml data
        id: meta
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          HA_ARCH: ${{ steps.norm.outputs.ha_arch }}
        run: |
          echo "Reading build.yaml for $ADDON ($HA_ARCH)"

          BUILD_FROM=$(yq '.build_from[strenv(HA_ARCH)]' "./${ADDON}/build.yaml")

          if [ -z "$BUILD_FROM" ] || [ "$BUILD_FROM" = "null" ]; then
            echo "❌ BUILD_FROM missing for $HA_ARCH"
            exit 1
          fi

          echo "build_from=$BUILD_FROM" >> $GITHUB_OUTPUT

          # Convert args: en key=value lignes
          yq '.args | to_entries[] | "\(.key)=\(.value)"' "./${ADDON}/build.yaml" > buildargs.txt

          echo "args<<EOF" >> $GITHUB_OUTPUT
          cat buildargs.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # SKIP BUILD if image already exists on Docker Hub
      # ---------------------------------------------------------
      - name: Check if image exists
        id: exist
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          ARCH="${{ matrix.arch }}"
          URL="https://hub.docker.com/v2/repositories/pulpyyyy/${ADDON}-${ARCH}/tags/${VERSION}/"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" -eq 200 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # BUILDX & LOGIN
      # ---------------------------------------------------------
      - name: Setup Buildx
        if: steps.exist.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.exist.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------------------------------------------
      # BUILD PAR ARCH
      # ---------------------------------------------------------
      - name: Build image (per arch)
        if: steps.exist.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ needs.prepare.outputs.addon }}
          platforms: linux/${{ matrix.arch }}
          push: true

          tags: |
            pulpyyyy/${{ needs.prepare.outputs.addon }}-${{ matrix.arch }}:${{ needs.prepare.outputs.version }}
            pulpyyyy/${{ needs.prepare.outputs.addon }}-${{ matrix.arch }}:latest

          build-args: |
            BUILD_FROM=${{ steps.meta.outputs.build_from }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
            ${{ steps.meta.outputs.args }}

          provenance: false
          sbom: false

          cache-from: type=registry,ref=pulpyyyy/${{ needs.prepare.outputs.addon }}-${{ matrix.arch }}:latest
          cache-to: type=inline

  # #############################################################
  #                     MANIFEST JOB
  # #############################################################
  manifest:
    runs-on: ubuntu-latest
    needs: [prepare, build]

    outputs:
      built: ${{ steps.result.outputs.built }}

    steps:
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------------------------------------------------
      # VÉRIFICATION que les 2 images arch sont bien disponibles
      # ---------------------------------------------------------
      - name: Check arch images exist
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          VERSION: ${{ needs.prepare.outputs.version }}
          ARCHS: ${{ needs.prepare.outputs.archs }}
        run: |
          for ARCH in $(echo "$ARCHS" | jq -r '.[]'); do
            URL="https://hub.docker.com/v2/repositories/pulpyyyy/${ADDON}-${ARCH}/tags/${VERSION}/"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" -ne 200 ]; then
              echo "❌ Image pulpyyyy/${ADDON}-${ARCH}:${VERSION} not found (HTTP $STATUS)"
              exit 1
            fi
            echo "✔ pulpyyyy/${ADDON}-${ARCH}:${VERSION} exists"
          done

      # ---------------------------------------------------------
      # SKIP VERSION MANIFEST IF ALREADY EXISTS
      # ---------------------------------------------------------
      - name: Check if VERSION manifest exists
        id: manifestcheck
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          URL="https://hub.docker.com/v2/repositories/pulpyyyy/${ADDON}/tags/${VERSION}/"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" -eq 200 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✔ Manifest ${VERSION} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❗ Manifest ${VERSION} missing, will create it."
          fi

      - name: Set built output
        id: result
        env:
          EXISTS: ${{ steps.manifestcheck.outputs.exists }}
        run: |
          if [ "$EXISTS" = "false" ]; then
            echo "built=true" >> $GITHUB_OUTPUT
          else
            echo "built=false" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # MULTI‑ARCH MANIFEST
      # ---------------------------------------------------------
      - name: Create VERSION manifest
        if: steps.manifestcheck.outputs.exists == 'false'
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          VERSION: ${{ needs.prepare.outputs.version }}
          ARCHS: ${{ needs.prepare.outputs.archs }}
        run: |
          SOURCES=$(echo "$ARCHS" | jq -r '.[] | "pulpyyyy/'"$ADDON"'-\(.)'":\$VERSION"'"')
          docker buildx imagetools create --tag pulpyyyy/$ADDON:$VERSION $SOURCES

      # LATEST est toujours mis à jour, indépendamment du check VERSION
      - name: Create LATEST manifest
        env:
          ADDON: ${{ needs.prepare.outputs.addon }}
          ARCHS: ${{ needs.prepare.outputs.archs }}
        run: |
          SOURCES=$(echo "$ARCHS" | jq -r '.[] | "pulpyyyy/'"$ADDON"'-\(.):latest"')
          docker buildx imagetools create --tag pulpyyyy/$ADDON:latest $SOURCES
