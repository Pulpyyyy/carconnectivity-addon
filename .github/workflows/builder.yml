name: Builder (2026)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      addon:
        description: "Addon folder (optionnel si appelé par orchestrateur)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ "amd64", "aarch64" ]

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve addon name
        id: resolve
        run: |
          # workflow_call → inputs.addon
          # manual run     → github.event.inputs.addon
          ADDON="${{ github.event.inputs.addon || inputs.addon }}"
          echo "addon=$ADDON" >> $GITHUB_OUTPUT

      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ steps.resolve.outputs.addon }}"

      - name: Check if image exists
        id: exist
        run: |
          TAG="${{ steps.info.outputs.version }}"
          ADDON="${{ steps.resolve.outputs.addon }}"
          ARCH="${{ matrix.arch }}"
          NAMESPACE="pulpyyyy"

          URL="https://hub.docker.com/v2/repositories/${NAMESPACE}/${ADDON}-${ARCH}/tags/${TAG}/"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")

          if [ "$STATUS" -eq 200 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build with HA Docker Builder
        if: steps.exist.outputs.exists == 'false'
        run: |
          ADDON="${{ steps.resolve.outputs.addon }}"
          ARCH="${{ matrix.arch }}"

          docker run --rm --privileged \
            -v "${{ github.workspace }}/:${{ github.workspace }}/" \
            ghcr.io/home-assistant/amd64-builder:2026.03.2 \
              --addon \
              --${{ matrix.arch }} \
              --target "${{ github.workspace }}/${{ steps.resolve.outputs.addon }}" \
              --docker-hub docker.io \
              --image "pulpyyyy/${{ steps.resolve.outputs.addon }}-${{ matrix.arch }}" \
              --docker-user "${{ secrets.DOCKERHUB_USERNAME }}" \
              --docker-password "${{ secrets.DOCKERHUB_TOKEN }}"
