name: Builder (2026 compatible)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string

  # Permet de lancer le build manuellement
  workflow_dispatch:
    inputs:
      addon:
        description: "Nom du dossier addon (ex: carconnectivity-addon-edge)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: ["amd64", "aarch64"]

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      # Détermine le nom du dossier addon
      - name: Resolve addon name
        id: resolve
        run: |
          ADDON="${{ github.event.inputs.addon || inputs.addon }}"
          echo "addon=$ADDON" >> $GITHUB_OUTPUT

      # Récupère version et info via helper officiel Home Assistant
      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ steps.resolve.outputs.addon }}"

      # Vérifie si l'image existe déjà (skip build)
      - name: Check if image exists
        id: exist
        run: |
          TAG="${{ steps.info.outputs.version }}"
          ADDON="${{ steps.resolve.outputs.addon }}"
          ARCH="${{ matrix.arch }}"
          NAMESPACE="pulpyyyy"

          URL="https://hub.docker.com/v2/repositories/${NAMESPACE}/${ADDON}-${ARCH}/tags/${TAG}/"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")

          if [ "$STATUS" -eq 200 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # Construction via Docker Builder officiel Home Assistant
      - name: Build with HA Docker Builder
        if: steps.exist.outputs.exists == 'false'
        run: |
          ADDON="${{ steps.resolve.outputs.addon }}"
          ARCH="${{ matrix.arch }}"

          echo "Building addon: $ADDON for arch: $ARCH"

          docker run --rm --privileged \
            -v "${{ github.workspace }}/${ADDON}:/data" \
            ghcr.io/home-assistant/amd64-builder:2026.03.2 \
              --addon \
              --$ARCH \
              --docker-hub docker.io \
              --target /data \
              --image "pulpyyyy/$ADDON-$ARCH" \
              --docker-user "${{ secrets.DOCKERHUB_USERNAME }}" \
              --docker-password "${{ secrets.DOCKERHUB_TOKEN }}"
