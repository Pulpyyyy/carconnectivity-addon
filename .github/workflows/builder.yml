name: Build and Push Docker Images
permissions:
  contents: read
  packages: write
  id-token: write

on:
  push:
    tags:
      - 'v*'
      - '!*-edge'
  workflow_dispatch:
  workflow_call:
    inputs:
      addon:
        description: 'Addon to build (e.g. carconnectivity-addon-edge). If empty, builds both.'
        required: false
        type: string
  
env:
  REPOSITORY: pulpyyyy
  REGISTRY: docker.io
  
concurrency:
  group: ${{ github.ref }}-${{ inputs.addon || 'all' }}
  cancel-in-progress: true

jobs:
  build_addon:
    name: Build addon
    runs-on: ubuntu-latest
    strategy:
      matrix:
        addon: ${{ inputs.addon && fromJSON(format('["{0}"]', inputs.addon)) || fromJSON('["carconnectivity-addon", "carconnectivity-addon-edge"]') }}
        arch: ["amd64", "aarch64"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Check if image already exists on Docker Hub
        id: check_image
        run: |
          TAG="${{ steps.info.outputs.version }}"
          ADDON="${{ matrix.addon }}"
          ARCH="${{ matrix.arch }}"

          IMAGE="https://hub.docker.com/v2/repositories/${{ env.REPOSITORY }}/${ADDON}-${ARCH}/tags/${TAG}/"

          echo "Checking: $IMAGE"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$IMAGE")

          if [ "$STATUS" -ne 200 ]; then
            echo "❌ $ADDON-$ARCH:$TAG does NOT exist yet."
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "✔ $ADDON-$ARCH:$TAG already exists."
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Build & Publish
        if: steps.check_image.outputs.exists == 'false'
        uses: home-assistant/builder@2026.03.2
        with:
          args: |
            --addon
            --arch ${{ matrix.arch }}
            --docker-hub "${{ env.REGISTRY }}"
            --target /data/${{ matrix.addon }}
            --image "${{ env.REPOSITORY }}/${{ matrix.addon }}-${{ matrix.arch }}"
            --docker-user ${{ secrets.DOCKERHUB_USERNAME }}
            --docker-password ${{ secrets.DOCKERHUB_TOKEN }}
