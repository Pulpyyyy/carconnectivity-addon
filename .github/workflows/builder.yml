name: Builder (Buildx Multi‑Arch FINAL)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      addon:
        description: "Nom du dossier addon (ex: carconnectivity-addon-edge)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ amd64, arm64 ]

    # 🔥 JOB OUTPUTS pour la job manifest
    outputs:
      addon: ${{ steps.resolve.outputs.addon }}
      version: ${{ steps.clean.outputs.version }}

    steps:
      # ---------------------------------------------------------
      # CHECKOUT
      # ---------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v6

      # ---------------------------------------------------------
      # RESOLVE ADDON NAME
      # ---------------------------------------------------------
      - name: Resolve addon name
        id: resolve
        run: |
          ADDON="${{ github.event.inputs.addon || inputs.addon }}"
          echo "addon=$ADDON" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # VERSION VIA CONFIG.YAML / HA HELPER
      # ---------------------------------------------------------
      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ steps.resolve.outputs.addon }}"

      - name: Clean version
        id: clean
        run: |
          VERSION=$(echo "${{ steps.info.outputs.version }}" | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # NORMALIZE ARCH FOR HA build.yaml
      # ---------------------------------------------------------
      - name: Normalize arch
        id: norm
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          if [ "$ARCH" = "arm64" ]; then
            echo "ha_arch=aarch64" >> $GITHUB_OUTPUT
          else
            echo "ha_arch=$ARCH" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # INSTALL yq v4
      # ---------------------------------------------------------
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      # ---------------------------------------------------------
      # READ build.yaml (BUILD_FROM + args key=value)
      # ---------------------------------------------------------
      - name: Read build.yaml data
        id: meta
        env:
          ADDON: ${{ steps.resolve.outputs.addon }}
          HA_ARCH: ${{ steps.norm.outputs.ha_arch }}
        run: |
          echo "Lecture build.yaml pour $ADDON ($HA_ARCH)"

          BUILD_FROM=$(yq '.build_from[strenv(HA_ARCH)]' "./${ADDON}/build.yaml")
          if [ -z "$BUILD_FROM" ] || [ "$BUILD_FROM" = "null" ]; then
            echo "❌ BUILD_FROM non trouvé"
            exit 1
          fi
          echo "build_from=$BUILD_FROM" >> $GITHUB_OUTPUT

          # Construit une liste key=value propre
          yq '.args | to_entries[] | "\(.key)=\(.value)"' "./${ADDON}/build.yaml" > buildargs.txt

          echo "args<<EOF" >> $GITHUB_OUTPUT
          cat buildargs.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # SKIP BUILD IF IMAGE ALREADY EXISTS
      # ---------------------------------------------------------
      - name: Check if image exists
        id: exist
        env:
          ADDON: ${{ steps.resolve.outputs.addon }}
          VERSION: ${{ steps.clean.outputs.version }}
        run: |
          ARCH="${{ matrix.arch }}"
          URL="https://hub.docker.com/v2/repositories/pulpyyyy/${ADDON}-${ARCH}/tags/${VERSION}/"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" -eq 200 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------
      # BUILDX + LOGIN
      # ---------------------------------------------------------
      - name: Setup Buildx
        if: steps.exist.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.exist.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------------------------------------------
      # BUILD PER ARCH (AVEC LES ARGS CORRIGÉS)
      # ---------------------------------------------------------
      - name: Build & Push image (per arch)
        if: steps.exist.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.resolve.outputs.addon }}
          platforms: linux/${{ matrix.arch }}
          push: true

          tags: |
            pulpyyyy/${{ steps.resolve.outputs.addon }}-${{ matrix.arch }}:${{ steps.clean.outputs.version }}
            pulpyyyy/${{ steps.resolve.outputs.addon }}-${{ matrix.arch }}:latest

          # 🔥 injection des build-args sans "Object"
          build-args: |
            BUILD_FROM=${{ steps.meta.outputs.build_from }}
            BUILD_VERSION=${{ steps.clean.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
            ${{ steps.meta.outputs.args }}

          provenance: false
          sbom: false

          cache-from: type=registry,ref=pulpyyyy/${{ steps.resolve.outputs.addon }}-${{ matrix.arch }}:latest
          cache-to: type=inline

  # ---------------------------------------------------------
  # MANIFEST MULTI‑ARCH FINAL
  # ---------------------------------------------------------
  manifest:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & Push manifest
        env:
          ADDON: ${{ needs.build.outputs.addon }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          echo "Manifest multi‑arch : $ADDON:$VERSION"

          docker manifest create pulpyyyy/$ADDON:$VERSION \
            pulpyyyy/$ADDON-amd64:$VERSION \
            pulpyyyy/$ADDON-arm64:$VERSION

          docker manifest push pulpyyyy/$ADDON:$VERSION

          docker manifest create pulpyyyy/$ADDON:latest \
            pulpyyyy/$ADDON-amd64:latest \
            pulpyyyy/$ADDON-arm64:latest

          docker manifest push pulpyyyy/$ADDON:latest
