name: Builder (Buildx Multi‑Arch PRO 2026)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      addon:
        description: "Nom du dossier addon (ex: carconnectivity-addon-edge)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ amd64, aarch64 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve addon name
        id: resolve
        run: |
          ADDON="${{ github.event.inputs.addon || inputs.addon }}"
          echo "addon=$ADDON" >> $GITHUB_OUTPUT

      - name: Get addon info (HA helper)
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ steps.resolve.outputs.addon }}"

      - name: Clean version
        id: clean
        run: |
          RAW="${{ steps.info.outputs.version }}"
          VERSION=$(echo "$RAW" | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ---------- INSTALL YQ ----------
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      # ---------- PARSE build.yaml ----------
      - name: Read build_from from build.yaml
        id: meta
        env:
          ADDON: ${{ steps.resolve.outputs.addon }}
          ARCH: ${{ matrix.arch }}
        run: |
          BUILD_FROM=$(yq ".build_from[env.ARCH]" "./${ADDON}/build.yaml")

          if [ "$BUILD_FROM" = "null" ] || [ -z "$BUILD_FROM" ]; then
            echo "❌ BUILD_FROM introuvable pour $ARCH"
            cat "./${ADDON}/build.yaml"
            exit 1
          fi

          echo "build_from=$BUILD_FROM" >> $GITHUB_OUTPUT

      # ---------- SKIP BUILD ----------
      - name: Check if image exists
        id: exist
        run: |
          TAG="${{ steps.clean.outputs.version }}"
          ADDON="${{ steps.resolve.outputs.addon }}"
          ARCH="${{ matrix.arch }}"

          URL="https://hub.docker.com/v2/repositories/pulpyyyy/${ADDON}-${ARCH}/tags/${TAG}/"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")

          if [ "$STATUS" -eq 200 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # ---------- BUILDX ----------
      - name: Setup Buildx
        if: steps.exist.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        if: steps.exist.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------- BUILD IMAGE PAR ARCH ----------
      - name: Build & Push per‑arch image
        if: steps.exist.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.resolve.outputs.addon }}
          platforms: linux/${{ matrix.arch }}

          push: true

          # ⚠️ PUSH VERS TES DÉPÔTS CORRECTS
          tags: |
            pulpyyyy/${{ steps.resolve.outputs.addon }}-${{ matrix.arch }}:${{ steps.clean.outputs.version }}
            pulpyyyy/${{ steps.resolve.outputs.addon }}-${{ matrix.arch }}:latest

          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.clean.outputs.version }}
            BUILD_FROM=${{ steps.meta.outputs.build_from }}

          cache-from: type=registry,ref=pulpyyyy/${{ steps.resolve.outputs.addon }}-${{ matrix.arch }}:latest
          cache-to: type=inline

  # ---------- MANIFEST MULTI‑ARCH ----------
  manifest:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & Push manifest
        uses: docker/manifest-create-action@v2
        with:
          tags: |
            pulpyyyy/${{ needs.build.outputs.addon }}:${{ needs.build.outputs.version }}
            pulpyyyy/${{ needs.build.outputs.addon }}:latest
          images: |
            pulpyyyy/${{ needs.build.outputs.addon }}-amd64:${{ needs.build.outputs.version }}
            pulpyyyy/${{ needs.build.outputs.addon }}-aarch64:${{ needs.build.outputs.version }}
