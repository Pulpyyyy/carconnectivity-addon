name: Builder (Buildx Multi‑Arch, 2026 PRO)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      addon:
        description: "Nom du dossier addon (ex: carconnectivity-addon-edge)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 🔍 Détection addon
      - name: Resolve addon name
        id: resolve
        run: |
          ADDON="${{ github.event.inputs.addon || inputs.addon }}"
          echo "addon=$ADDON" >> $GITHUB_OUTPUT

      # 🔍 Récupère info version / arch via helper officiel HA
      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ steps.resolve.outputs.addon }}"

      # 🔍 Vérification Docker Hub (skip build)
      - name: Check if image exists
        id: exist
        run: |
          TAG="${{ steps.info.outputs.version }}"
          ADDON="${{ steps.resolve.outputs.addon }}"

          for ARCH in amd64 aarch64; do
            IMG="pulpyyyy/${ADDON}-${ARCH}:${TAG}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://hub.docker.com/v2/repositories/pulpyyyy/${ADDON}-${ARCH}/tags/${TAG}/")

            if [ "$STATUS" -eq 200 ]; then
              echo "found_$ARCH=true" >> $GITHUB_OUTPUT
            else
              echo "found_$ARCH=false" >> $GITHUB_OUTPUT
            fi
          done

      # 🔧 Préparation buildx
      - name: Setup Docker Buildx
        if: steps.exist.outputs.found_amd64 == 'false' || steps.exist.outputs.found_aarch64 == 'false'
        uses: docker/setup-buildx-action@v3

      # 🔐 Login Docker Hub
      - name: Login to Docker Hub
        if: steps.exist.outputs.found_amd64 == 'false' || steps.exist.outputs.found_aarch64 == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🏗️ Build AMD64
      - name: Build amd64
        if: steps.exist.outputs.found_amd64 == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.resolve.outputs.addon }}
          platforms: linux/amd64
          push: true
          tags: pulpyyyy/${{ steps.resolve.outputs.addon }}-amd64:${{ steps.info.outputs.version }}
          cache-from: type=registry,ref=pulpyyyy/${{ steps.resolve.outputs.addon }}-amd64:latest
          cache-to: type=inline

      # 🏗️ Build AARCH64
      - name: Build aarch64
        if: steps.exist.outputs.found_aarch64 == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.resolve.outputs.addon }}
          platforms: linux/arm64
          push: true
          tags: pulpyyyy/${{ steps.resolve.outputs.addon }}-aarch64:${{ steps.info.outputs.version }}
          cache-from: type=registry,ref=pulpyyyy/${{ steps.resolve.outputs.addon }}-aarch64:latest
          cache-to: type=inline

      # 🏷️ Publie les tags latest par arch
      - name: Tag latest amd64
        if: steps.exist.outputs.found_amd64 == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.resolve.outputs.addon }}
          platforms: linux/amd64
          push: true
          tags: pulpyyyy/${{ steps.resolve.outputs.addon }}-amd64:latest

      - name: Tag latest aarch64
        if: steps.exist.outputs.found_aarch64 == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.resolve.outputs.addon }}
          platforms: linux/arm64
          push: true
          tags: pulpyyyy/${{ steps.resolve.outputs.addon }}-aarch64:latest

      # 🧩 Manifest multi‑arch : edge + stable
      - name: Create multi‑arch manifest
        uses: docker/manifest-create-action@v2
        with:
          images: |
            pulpyyyy/${{ steps.resolve.outputs.addon }}-amd64:${{ steps.info.outputs.version }}
            pulpyyyy/${{ steps.resolve.outputs.addon }}-aarch64:${{ steps.info.outputs.version }}
          tag: pulpyyyy/${{ steps.resolve.outputs.addon }}:${{ steps.info.outputs.version }}

      - name: Push manifest latest
        uses: docker/manifest-create-action@v2
        with:
          images: |
            pulpyyyy/${{ steps.resolve.outputs.addon }}-amd64:latest
            pulpyyyy/${{ steps.resolve.outputs.addon }}-aarch64:latest
          tag: pulpyyyy/${{ steps.resolve.outputs.addon }}:latest
