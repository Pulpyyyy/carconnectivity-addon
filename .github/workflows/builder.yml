name: Builder (Docker mode)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string
      docker_registry:
        required: true
        type: string
      docker_namespace:
        required: true
        type: string
      docker_username:
        required: true
        type: string
      docker_password:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: ["amd64", "aarch64"]

    steps:

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ inputs.addon }}"

      - name: Check if image exists
        id: exist
        run: |
          TAG="${{ steps.info.outputs.version }}"
          ADDON="${{ inputs.addon }}"
          ARCH="${{ matrix.arch }}"

          URL="https://hub.docker.com/v2/repositories/${{ inputs.docker_namespace }}/${ADDON}-${ARCH}/tags/${TAG}/"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")

          if [ "$STATUS" -eq 200 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build addon using Docker builder
        if: steps.exist.outputs.exists == 'false'
        run: |
          docker run --rm \
            --privileged \
            -v "${{ github.workspace }}:/data" \
            ghcr.io/home-assistant/amd64-builder:2026.03.2 \
              --addon \
              --${{ matrix.arch }} \
              --docker-hub "${{ inputs.docker_registry }}" \
              --image "${{ inputs.docker_namespace }}/${{ inputs.addon }}-${{ matrix.arch }}" \
              --docker-user "${{ inputs.docker_username }}" \
              --docker-password "${{ inputs.docker_password }}"
