name: Builder (Home Assistant 2026 compatible)

on:
  workflow_call:
    inputs:
      addon:
        description: "Addon folder to build"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  DOCKER_NAMESPACE: pulpyyyy
  DOCKER_REGISTRY: docker.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: ["amd64", "aarch64"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      # Récupération des infos de version via HA
      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ inputs.addon }}"

      # --- CHECK SI L’IMAGE EXISTE DÉJÀ ---
      - name: Check if image already exists on Docker Hub
        id: check_image
        run: |
          TAG="${{ steps.info.outputs.version }}"
          ADDON="${{ inputs.addon }}"
          ARCH="${{ matrix.arch }}"

          IMAGE_URL="https://hub.docker.com/v2/repositories/${{ env.DOCKER_NAMESPACE }}/${ADDON}-${ARCH}/tags/${TAG}/"

          echo "Checking: $IMAGE_URL"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$IMAGE_URL")

          if [ "$STATUS" -ne 200 ]; then
            echo "❌ $ADDON-$ARCH:$TAG does NOT exist yet. Build required."
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "✔ $ADDON-$ARCH:$TAG already exists. Skip build."
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      # --- BUILD SI NON EXISTANT ---
      - name: Build addon image
        if: steps.check_image.outputs.exists == 'false'
        uses: home-assistant/builder/.github/workflows/build-addon.yml@2026.03.2
        with:
          addon: ${{ inputs.addon }}
          architecture: ${{ matrix.arch }}
          docker_registry: ${{ env.DOCKER_REGISTRY }}
          docker_repository: ${{ env.DOCKER_NAMESPACE }}
          docker_username: ${{ secrets.DOCKERHUB_USERNAME }}
          docker_password: ${{ secrets.DOCKERHUB_TOKEN }}
