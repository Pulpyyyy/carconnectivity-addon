name: Builder (Home Assistant 2026 compatible)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  DOCKER_NAMESPACE: pulpyyyy
  DOCKER_REGISTRY: docker.io

jobs:

  # 1️⃣ JOB DE VERIFICATION : EXISTE DEJA ?
  check:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check_image.outputs.exists }}

    strategy:
      matrix:
        arch: ["amd64", "aarch64"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ inputs.addon }}"

      - name: Check if image exists on Docker Hub
        id: check_image
        run: |
          TAG="${{ steps.info.outputs.version }}"
          ADDON="${{ inputs.addon }}"
          ARCH="${{ matrix.arch }}"

          URL="https://hub.docker.com/v2/repositories/${{ env.DOCKER_NAMESPACE }}/${ADDON}-${ARCH}/tags/${TAG}/"

          echo "Checking $URL"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")

          if [ "$STATUS" -ne 200 ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

  # 2️⃣ JOB BUILDER : APPEL DU REUSABLE, UNIQUEMENT SI BESOIN
  build:
    needs: check
    if: needs.check.outputs.exists == 'false'
    uses: home-assistant/builder/.github/workflows/build-addon.yml@2026.03.2

    with:
      addon: ${{ inputs.addon }}
      architecture: ${{ matrix.arch }}
      docker_registry: ${{ env.DOCKER_REGISTRY }}
      docker_repository: ${{ env.DOCKER_NAMESPACE }}
      docker_username: ${{ secrets.DOCKERHUB_USERNAME }}
      docker_password: ${{ secrets.DOCKERHUB_TOKEN }}
