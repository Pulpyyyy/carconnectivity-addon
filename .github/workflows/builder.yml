name: Builder (Home Assistant 2026)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string
      docker_registry:
        required: true
        type: string
      docker_namespace:
        required: true
        type: string
      docker_username:
        required: true
        type: string
      docker_password:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: ["amd64", "aarch64"]
    outputs:
      exists: ${{ steps.check_image.outputs.exists }}
      arch: ${{ matrix.arch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ inputs.addon }}"

      - name: Check if image already exists on Docker Hub
        id: check_image
        run: |
          TAG="${{ steps.info.outputs.version }}"
          ADDON="${{ inputs.addon }}"
          ARCH="${{ matrix.arch }}"

          URL="https://hub.docker.com/v2/repositories/${{ inputs.docker_namespace }}/${ADDON}-${ARCH}/tags/${TAG}/"

          echo "Checking $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")

          if [ "$STATUS" -ne 200 ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.exists == 'false'
    uses: home-assistant/builder/.github/workflows/build-addon.yml@2026.03.2
    with:
      addon: ${{ inputs.addon }}
      architecture: ${{ needs.check.outputs.arch }}
      docker_registry: ${{ inputs.docker_registry }}
      docker_repository: ${{ inputs.docker_namespace }}
      docker_username: ${{ inputs.docker_username }}
      docker_password: ${{ inputs.docker_password }}
