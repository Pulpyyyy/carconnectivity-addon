name: Builder (Buildx Multi‑Arch PRO 2026)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      addon:
        description: "Nom du dossier addon (ex: carconnectivity-addon-edge)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve addon name
        id: resolve
        run: |
          ADDON="${{ github.event.inputs.addon || inputs.addon }}"
          echo "addon=$ADDON" >> $GITHUB_OUTPUT

      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ steps.resolve.outputs.addon }}"

      # ----- SKIP BUILD PAR ARCH -----
      - name: Check if images exist on Docker Hub
        id: exist
        run: |
          TAG="${{ steps.info.outputs.version }}"
          ADDON="${{ steps.resolve.outputs.addon }}"

          for ARCH in amd64 aarch64; do
            URL="https://hub.docker.com/v2/repositories/pulpyyyy/${ADDON}-${ARCH}/tags/${TAG}/"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")

            if [ "$STATUS" -eq 200 ]; then
              echo "found_${ARCH}=true" >> $GITHUB_OUTPUT
            else
              echo "found_${ARCH}=false" >> $GITHUB_OUTPUT
            fi
          done

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        if: steps.exist.outputs.found_amd64 == 'false' || steps.exist.outputs.found_aarch64 == 'false'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: steps.exist.outputs.found_amd64 == 'false' || steps.exist.outputs.found_aarch64 == 'false'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----- BUILD & MANIFEST MULTI-ARCH AUTOMATIQUE -----
      - name: Build & Push Multi‑Arch
        if: steps.exist.outputs.found_amd64 == 'false' || steps.exist.outputs.found_aarch64 == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.resolve.outputs.addon }}
          platforms: |
            linux/amd64
            linux/arm64
          push: true

          # Manifest multi-arch auto pour VERSION
          tags: |
            pulpyyyy/${{ steps.resolve.outputs.addon }}:${{ steps.info.outputs.version }}
            pulpyyyy/${{ steps.resolve.outputs.addon }}:latest

          # Tags séparés par arch (comme AVANT)
          # Home Assistant aime ça pour ses registres
          labels: |
            io.hass.version=${{ steps.info.outputs.version }}
            io.hass.arch=amd64|aarch64
