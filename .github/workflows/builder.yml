name: Builder (Buildx Multi‑Arch ULTRA‑PATCHÉ 2026)

on:
  workflow_call:
    inputs:
      addon:
        required: true
        type: string

  workflow_dispatch:
    inputs:
      addon:
        description: "Nom du dossier addon (ex: carconnectivity-addon-edge)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [ amd64, arm64 ]

    steps:
      # -----------------------------
      # CHECKOUT
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v6

      # -----------------------------
      # RESOLVE ADDON NAME
      # -----------------------------
      - name: Resolve addon name
        id: resolve
        run: |
          ADDON="${{ github.event.inputs.addon || inputs.addon }}"
          echo "addon=$ADDON" >> $GITHUB_OUTPUT

      # -----------------------------
      # GET VERSION FROM CONFIG.YAML VIA HA HELPER
      # -----------------------------
      - name: Get addon info (Home Assistant)
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ steps.resolve.outputs.addon }}"

      - name: Clean version
        id: clean
        run: |
          RAW="${{ steps.info.outputs.version }}"
          VERSION=$(echo "$RAW" | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # -----------------------------
      # NORMALIZE ARCH arm64 → aarch64
      # -----------------------------
      - name: Normalize arch for Home Assistant build.yaml
        id: norm
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          if [ "$ARCH" = "arm64" ]; then
            echo "ha_arch=aarch64" >> $GITHUB_OUTPUT
          else
            echo "ha_arch=$ARCH" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # INSTALL YQ (YAML parser v4)
      # -----------------------------
      - name: Install yq v4
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      # -----------------------------
      # READ *ALL* BUILD ARGS FROM build.yaml
      # -----------------------------
      - name: Read BUILD_FROM + ARGs from build.yaml
        id: meta
        env:
          ADDON: ${{ steps.resolve.outputs.addon }}
          HA_ARCH: ${{ steps.norm.outputs.ha_arch }}
        run: |
          echo "🔍 Lecture build.yaml pour ${ADDON} (${HA_ARCH})"

          # BUILD_FROM
          BUILD_FROM=$(yq '.build_from[strenv(HA_ARCH)]' "./${ADDON}/build.yaml")
          if [ -z "$BUILD_FROM" ] || [ "$BUILD_FROM" = "null" ]; then
            echo "❌ BUILD_FROM introuvable pour $HA_ARCH"
            cat "./${ADDON}/build.yaml"
            exit 1
          fi
          echo "build_from=$BUILD_FROM" >> $GITHUB_OUTPUT

          # ARGUMENTS DE build.yaml
          echo "🔍 Extraction des ARGs…"
          yq '.args | to_entries | .[] | "\(.key)=\(.value)"' "./${ADDON}/build.yaml" > buildargs.txt

          echo "args=$(cat buildargs.txt | tr '\n' ',' )" >> $GITHUB_OUTPUT

          echo "ARGs détectés :"
          cat buildargs.txt

      # -----------------------------
      # SKIP BUILD IF ALREADY EXISTS
      # -----------------------------
      - name: Check if image exists on Docker Hub
        id: exist
        env:
          ADDON: ${{ steps.resolve.outputs.addon }}
          VERSION: ${{ steps.clean.outputs.version }}
        run: |
          ARCH="${{ matrix.arch }}"
          URL="https://hub.docker.com/v2/repositories/pulpyyyy/${ADDON}-${ARCH}/tags/${VERSION}/"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")

          if [ "$STATUS" -eq 200 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # BUILDX + DOCKER LOGIN
      # -----------------------------
      - name: Setup Buildx
        if: steps.exist.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.exist.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------
      # BUILD PER ARCH (with all args injected)
      # -----------------------------
      - name: Build & Push image (per arch)
        if: steps.exist.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ steps.resolve.outputs.addon }}
          platforms: linux/${{ matrix.arch }}
          push: true

          # Dépôts par arch
          tags: |
            pulpyyyy/${{ steps.resolve.outputs.addon }}-${{ matrix.arch }}:${{ steps.clean.outputs.version }}
            pulpyyyy/${{ steps.resolve.outputs.addon }}-${{ matrix.arch }}:latest

          # Tous les arguments build.yaml + ceux HA
          build-args: |
            BUILD_FROM=${{ steps.meta.outputs.build_from }}
            BUILD_VERSION=${{ steps.clean.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
            ${{ steps.meta.outputs.args }}

          # Pas d'attestations (plus rapide/fiable)
          provenance: false
          sbom: false

          cache-from: type=registry,ref=pulpyyyy/${{ steps.resolve.outputs.addon }}-${{ matrix.arch }}:latest
          cache-to: type=inline

  # -----------------------------
  # MANIFEST MULTI‑ARCH FINAL
  # -----------------------------
  manifest:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push multi‑arch manifest
        run: |
          ADDON="${{ needs.build.steps.resolve.outputs.addon }}"
          VERSION="${{ needs.build.steps.clean.outputs.version }}"

          echo "🧩 Création manifest : $ADDON:$VERSION"

          docker manifest create pulpyyyy/$ADDON:$VERSION \
            pulpyyyy/$ADDON-amd64:$VERSION \
            pulpyyyy/$ADDON-arm64:$VERSION

          docker manifest push pulpyyyy/$ADDON:$VERSION

          docker manifest create pulpyyyy/$ADDON:latest \
            pulpyyyy/$ADDON-amd64:latest \
            pulpyyyy/$ADDON-arm64:latest

          docker manifest push pulpyyyy/$ADDON:latest
